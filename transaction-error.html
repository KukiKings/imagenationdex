<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Transaction Error — IN$DEX</title>
<style>
  :root {
    --cyan: #00D4FF; --blue: #2B35D8; --purple: #8B3FE8;
    --black: #090A10; --green: #00E5A0; --gold: #FFB800;
    --red: #FF4D6D; --surface: #12141F; --surface2: #1A1D2E;
    --surface3: #22263A; --text: #F0F2FF; --text2: #A0A8C8;
    --text-muted: #5A6080;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; max-width:430px; margin:0 auto; min-height:100vh; }
  .topbar { background:var(--surface); border-bottom:1px solid rgba(255,255,255,0.06); padding:14px 16px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:100; }
  .back-btn { width:36px; height:36px; border:none; background:var(--surface2); border-radius:10px; color:var(--text); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .topbar-title { font-size:16px; font-weight:600; }

  /* Error type tabs */
  .error-types { display:flex; gap:8px; padding:16px 16px 0; overflow-x:auto; scrollbar-width:none; }
  .error-types::-webkit-scrollbar { display:none; }
  .error-tab { padding:8px 14px; background:var(--surface); border:1px solid var(--surface3); border-radius:20px; color:var(--text2); font-size:12px; cursor:pointer; white-space:nowrap; transition:all 0.2s; flex-shrink:0; }
  .error-tab.active { background:rgba(255,77,109,0.15); border-color:rgba(255,77,109,0.4); color:var(--red); }

  .content { padding:16px; padding-bottom:120px; }

  /* Error hero */
  .error-hero { text-align:center; padding:24px 0 16px; }
  .error-icon-ring { width:80px; height:80px; border-radius:50%; border:3px solid var(--red); display:flex; align-items:center; justify-content:center; font-size:36px; margin:0 auto 16px; background:rgba(255,77,109,0.08); }
  .error-title { font-size:20px; font-weight:800; margin-bottom:6px; }
  .error-code { font-size:12px; color:var(--text-muted); font-family:monospace; background:var(--surface); padding:4px 12px; border-radius:20px; display:inline-block; }

  /* SIINDEX explanation */
  .si-card { background:var(--surface2); border-left:3px solid var(--cyan); border-radius:12px; padding:14px 16px; display:flex; gap:12px; align-items:flex-start; margin:16px 0; }
  .si-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--cyan),var(--purple)); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .si-name { font-size:11px; color:var(--cyan); font-weight:600; margin-bottom:3px; letter-spacing:0.5px; }
  .si-text { font-size:13px; color:var(--text2); line-height:1.6; }

  /* What happened */
  .detail-card { background:var(--surface); border-radius:14px; margin-bottom:14px; overflow:hidden; }
  .detail-title { padding:12px 16px; background:var(--surface2); font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); }
  .detail-row { display:flex; justify-content:space-between; align-items:flex-start; padding:12px 16px; border-top:1px solid rgba(255,255,255,0.04); gap:10px; }
  .detail-label { font-size:12px; color:var(--text-muted); flex-shrink:0; }
  .detail-value { font-size:12px; color:var(--text2); text-align:right; }

  /* Fund safety note */
  .safe-badge { background:rgba(0,229,160,0.08); border:1px solid rgba(0,229,160,0.25); border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .safe-icon { font-size:20px; flex-shrink:0; }
  .safe-text { font-size:13px; color:var(--text); font-weight:500; }

  /* Actions */
  .action-title { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin:16px 0 10px; }
  .action-list { display:flex; flex-direction:column; gap:10px; }
  .action-card { background:var(--surface); border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:12px; cursor:pointer; border:1px solid transparent; transition:all 0.2s; }
  .action-card:hover { border-color:rgba(0,212,255,0.3); }
  .action-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .action-icon.cyan { background:rgba(0,212,255,0.1); }
  .action-icon.purple { background:rgba(139,63,232,0.1); }
  .action-icon.green { background:rgba(0,229,160,0.1); }
  .action-info { flex:1; }
  .action-name { font-size:14px; font-weight:600; }
  .action-desc { font-size:12px; color:var(--text-muted); margin-top:2px; }
  .action-arrow { color:var(--text-muted); font-size:16px; }

  .cta-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:linear-gradient(transparent,var(--black) 30%); padding:16px; }
  .retry-btn { width:100%; padding:16px; background:linear-gradient(135deg,var(--blue),var(--purple)); border:none; border-radius:14px; color:#fff; font-size:16px; font-weight:700; cursor:pointer; margin-bottom:10px; }
  .home-btn { width:100%; padding:13px; background:transparent; border:1px solid var(--surface3); border-radius:14px; color:var(--text2); font-size:15px; cursor:pointer; }

  .toast { position:fixed; bottom:130px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--surface2); color:var(--text); padding:12px 20px; border-radius:12px; font-size:13px; font-weight:500; transition:transform 0.3s; z-index:200; border:1px solid rgba(0,229,160,0.3); white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">←</button>
  <span class="topbar-title">Transaction Issue</span>
</div>

<div class="error-types">
  <div class="error-tab active" onclick="setError('network',this)">Network</div>
  <div class="error-tab" onclick="setError('funds',this)">Insufficient Funds</div>
  <div class="error-tab" onclick="setError('compliance',this)">Compliance Hold</div>
  <div class="error-tab" onclick="setError('timeout',this)">Timeout</div>
  <div class="error-tab" onclick="setError('slippage',this)">Slippage</div>
</div>

<div class="content" id="errorContent"></div>

<div class="cta-bar">
  <button class="retry-btn" id="retryBtn" onclick="retryTxn()">Try Again</button>
  <button class="home-btn" onclick="window.location.href='index.html'">Back to Dashboard</button>
</div>

<div class="toast" id="toast"></div>

<script>
const ERRORS = {
  network: {
    icon: '📡',
    title: 'Network interruption',
    code: 'ERR-NET-001',
    siindex: "Your transfer didn't go through — the Solana network briefly wasn't responding. Your funds were never moved. I've already queued a retry. Tap below when ready. Standing by.",
    details: [
      ['Transaction', '50 INDX to Maria Santos'],
      ['Status', 'Not submitted — no funds moved'],
      ['Network', 'Solana — temporary congestion'],
      ['Time', '2:47 PM, 15 June 2026'],
    ],
    actions: ['retry','home','support'],
    retryLabel: 'Try Again — Network is Clear'
  },
  funds: {
    icon: '💳',
    title: 'Insufficient balance',
    code: 'ERR-BAL-001',
    siindex: "Your transfer couldn't complete — you need 150 INDX but your balance is 98.5 INDX. You have a few options: top up, reduce the amount, or use a different asset. No funds were moved. Standing by.",
    details: [
      ['Attempted', '150 INDX ($52.50)'],
      ['Your balance', '98.5 INDX ($34.48)'],
      ['Shortfall', '51.5 INDX ($18.03)'],
      ['Status', 'Not submitted — no funds moved'],
    ],
    actions: ['topup','reduce','support'],
    retryLabel: 'Top Up Wallet'
  },
  compliance: {
    icon: '🛡️',
    title: 'Compliance hold',
    code: 'ERR-COMP-001',
    siindex: "I've placed a temporary hold on this transfer. It triggered a compliance check — not because anything is wrong, but because your transfer amount requires a 30-second verification step. Your funds are safe. Tap below to complete the check. Standing by.",
    details: [
      ['Transaction', '$1,200 USDC to external wallet'],
      ['Reason', 'FATF Travel Rule — transfers >$1,000'],
      ['Hold type', 'Temporary — pending identity step'],
      ['Estimated time', '30 seconds to resolve'],
    ],
    actions: ['verify','support'],
    retryLabel: 'Complete Verification (30 sec)'
  },
  timeout: {
    icon: '⏱️',
    title: 'Transaction timed out',
    code: 'ERR-TIME-001',
    siindex: "Your transaction was submitted but didn't confirm within the expected window. This sometimes happens during high network activity. Check the transaction status first — it may have confirmed. If not, it's safe to retry. Your funds have not been moved twice. Standing by.",
    details: [
      ['Transaction hash', 'Ax7f...3kp9'],
      ['Submitted', '2:44 PM, 15 June 2026'],
      ['Timeout after', '30 seconds (no confirmation)'],
      ['Action needed', 'Check status, then retry if unconfirmed'],
    ],
    actions: ['status','retry','support'],
    retryLabel: 'Check Status & Retry'
  },
  slippage: {
    icon: '📉',
    title: 'Slippage too high',
    code: 'ERR-SLIP-001',
    siindex: "I stopped this swap — the market moved while your order was being processed, and the price slipped 2.3% beyond your 1% tolerance. Your funds are untouched. You can retry with a higher slippage tolerance, or wait for the market to settle. Standing by.",
    details: [
      ['Swap', '100 USDC → INDX'],
      ['Expected price', '$0.24 per INDX'],
      ['Actual price', '$0.243 per INDX'],
      ['Slippage', '2.3% — exceeded 1% tolerance'],
    ],
    actions: ['adjust','retry','support'],
    retryLabel: 'Retry with Higher Tolerance'
  }
};

function setError(type, el) {
  document.querySelectorAll('.error-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const err = ERRORS[type];
  document.getElementById('retryBtn').textContent = err.retryLabel;

  let detailRows = err.details.map(([l,v]) =>
    `<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-value">${v}</span></div>`
  ).join('');

  document.getElementById('errorContent').innerHTML = `
    <div class="error-hero">
      <div class="error-icon-ring">${err.icon}</div>
      <div class="error-title">${err.title}</div>
      <div class="error-code">${err.code}</div>
    </div>

    <div class="safe-badge">
      <div class="safe-icon">✅</div>
      <div class="safe-text">Your funds are safe. Nothing was moved.</div>
    </div>

    <div class="si-card">
      <div class="si-avatar">⚡</div>
      <div>
        <div class="si-name">SIINDEX</div>
        <div class="si-text">${err.siindex}</div>
      </div>
    </div>

    <div class="detail-card">
      <div class="detail-title">What happened</div>
      ${detailRows}
    </div>

    <div class="action-title">What you can do</div>
    <div class="action-list">
      <div class="action-card" onclick="showToast('Opening support...')">
        <div class="action-icon purple">🤖</div>
        <div class="action-info">
          <div class="action-name">Talk to SIINDEX</div>
          <div class="action-desc">I'll guide you through the next step</div>
        </div>
        <span class="action-arrow">›</span>
      </div>
      <div class="action-card" onclick="showToast('Opening transaction history...')">
        <div class="action-icon cyan">📋</div>
        <div class="action-info">
          <div class="action-name">View Transaction History</div>
          <div class="action-desc">See the full status on-chain</div>
        </div>
        <span class="action-arrow">›</span>
      </div>
      <div class="action-card" onclick="window.location.href='sovereign-support.html'">
        <div class="action-icon green">👤</div>
        <div class="action-info">
          <div class="action-name">Speak to a Human</div>
          <div class="action-desc">Escalate to our support team</div>
        </div>
        <span class="action-arrow">›</span>
      </div>
    </div>
  `;
}

function retryTxn() {
  showToast('Resubmitting transaction. Standing by.');
  setTimeout(() => { history.back(); }, 1800);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Init
setError('network', document.querySelector('.error-tab.active'));
</script>
</body>
</html>
