<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <meta name="theme-color" content="#090A10">
  <title>IN$DEX — Interest Feed</title>
  <style>
    :root{
      --cyan:#00D4FF;--blue:#2B35D8;--purple:#8B3FE8;
      --black:#090A10;--green:#00E5A0;--gold:#FFB800;
      --red:#FF4D6D;--surface:#12141F;--surface2:#1A1D2E;
      --surface3:#22263A;--text:#F0F2FF;--text2:#B0B8D8;
      --muted:rgba(176,184,216,0.45);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{background:var(--black);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;}
    body{min-height:100dvh;padding-bottom:calc(76px + env(safe-area-inset-bottom));}

    /* TOPBAR */
    .topbar{position:sticky;top:0;z-index:20;background:rgba(9,10,16,0.96);backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,0.06);
      padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));}
    .topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
    .topbar-logo{font-size:18px;font-weight:900;
      background:linear-gradient(135deg,var(--cyan),var(--purple));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .topbar-tag{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
    .si-curator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);}
    .si-curator-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    /* FILTER CHIPS */
    .filter-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
    .filter-scroll::-webkit-scrollbar{display:none;}
    .filter-chip{background:var(--surface2);border:1px solid rgba(255,255,255,0.09);border-radius:20px;
      padding:7px 14px;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;
      flex-shrink:0;font-family:inherit;transition:all .2s;white-space:nowrap;}
    .filter-chip.active,.filter-chip:active{background:rgba(0,212,255,0.1);border-color:var(--cyan);color:var(--cyan);}

    /* FEED */
    .feed{padding:16px 16px 0;}

    /* ── STORY CARD ── */
    .story-card{background:var(--surface);border:1px solid rgba(255,255,255,0.07);
      border-radius:20px;padding:18px;margin-bottom:14px;
      opacity:0;transform:translateY(12px);transition:opacity .45s ease,transform .45s ease;}
    .story-card.visible{opacity:1;transform:translateY(0);}
    .story-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
    .story-avi{width:48px;height:48px;border-radius:50%;background:var(--surface2);
      display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;
      border:2px solid rgba(255,255,255,0.08);}
    .creator-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;}
    .creator-loc{font-size:11px;color:var(--muted);}
    .card-type-badge{margin-left:auto;flex-shrink:0;font-size:10px;font-weight:700;
      letter-spacing:1px;text-transform:uppercase;color:var(--muted);border:1px solid rgba(255,255,255,0.1);
      border-radius:8px;padding:3px 8px;}
    .story-text{font-size:14px;line-height:1.65;color:var(--text2);margin-bottom:14px;}
    .story-text strong{color:var(--text);font-weight:600;}

    /* Product tag on story cards */
    .product-tag{display:flex;align-items:center;justify-content:space-between;
      background:var(--surface2);border:1px solid rgba(0,212,255,0.15);border-radius:14px;padding:10px 14px;}
    .product-tag-left{display:flex;align-items:center;gap:10px;}
    .product-tag-img{font-size:22px;}
    .product-tag-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
    .product-tag-price{font-size:12px;color:var(--cyan);font-weight:700;}
    .product-tag-btn{background:linear-gradient(135deg,rgba(43,53,216,0.8),rgba(0,212,255,0.7));
      border:none;border-radius:10px;padding:7px 12px;font-size:11px;font-weight:800;
      color:#fff;cursor:pointer;font-family:inherit;white-space:nowrap;transition:opacity .2s;}
    .product-tag-btn:active{opacity:.75;}

    /* ── EVENT CARD ── */
    .event-card{background:linear-gradient(135deg,rgba(43,53,216,0.12),rgba(139,63,232,0.08));
      border:1px solid rgba(43,53,216,0.3);border-radius:20px;padding:18px;margin-bottom:14px;
      opacity:0;transform:translateY(12px);transition:opacity .45s ease,transform .45s ease;}
    .event-card.visible{opacity:1;transform:translateY(0);}
    .event-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
    .event-icon{width:48px;height:48px;border-radius:14px;background:rgba(139,63,232,0.2);
      display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
    .event-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:3px;}
    .event-when{font-size:12px;color:var(--purple);font-weight:700;}
    .event-loc{font-size:11px;color:var(--muted);margin-top:2px;}
    .event-desc{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:14px;}
    .event-meta{display:flex;align-items:center;gap:12px;}
    .event-attending{font-size:12px;color:var(--muted);}
    .event-attending strong{color:var(--green);}
    .btn-event{background:rgba(139,63,232,0.15);border:1px solid rgba(139,63,232,0.35);
      border-radius:12px;padding:8px 16px;font-size:12px;font-weight:700;color:var(--purple);
      cursor:pointer;font-family:inherit;transition:all .2s;}
    .btn-event:active{background:rgba(139,63,232,0.25);}

    /* ── BEHIND SCENES CARD ── */
    .behind-card{background:var(--surface);border:1px solid rgba(255,255,255,0.07);
      border-radius:20px;overflow:hidden;margin-bottom:14px;
      opacity:0;transform:translateY(12px);transition:opacity .45s ease,transform .45s ease;}
    .behind-card.visible{opacity:1;transform:translateY(0);}
    .behind-visual{height:160px;background:linear-gradient(135deg,var(--surface2),var(--surface3));
      display:flex;align-items:center;justify-content:center;position:relative;}
    .behind-play{width:52px;height:52px;border-radius:50%;background:rgba(0,212,255,0.15);
      border:2px solid rgba(0,212,255,0.4);display:flex;align-items:center;justify-content:center;
      font-size:20px;cursor:pointer;}
    .behind-label{position:absolute;top:10px;left:12px;background:rgba(9,10,16,0.8);
      border-radius:8px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--cyan);
      letter-spacing:1px;text-transform:uppercase;}
    .behind-big-emoji{font-size:64px;opacity:.18;position:absolute;}
    .behind-body{padding:16px;}
    .behind-creator{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .behind-avi{width:36px;height:36px;border-radius:50%;background:var(--surface2);
      display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .behind-text{font-size:14px;line-height:1.55;color:var(--text2);margin-bottom:12px;}

    /* ── TREND STRIP ── */
    .trend-strip{background:rgba(0,229,160,0.05);border:1px solid rgba(0,229,160,0.15);
      border-radius:18px;padding:14px 16px;margin-bottom:14px;}
    .trend-strip-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
      color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .trend-strip-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
    .trend-items{display:flex;flex-direction:column;gap:7px;}
    .trend-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);}
    .trend-rank{font-size:11px;font-weight:700;color:var(--muted);width:16px;}
    .trend-name{flex:1;}
    .trend-delta{font-size:11px;font-weight:700;color:var(--green);}

    /* ── LOAD MORE ── */
    .load-more-btn{width:100%;margin:0 0 16px;padding:13px;background:transparent;
      border:1px solid rgba(255,255,255,0.1);border-radius:16px;color:var(--text2);
      font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;}
    .load-more-btn:active{border-color:var(--cyan);color:var(--cyan);}

    /* SIINDEX CURATION FOOTER */
    .si-footer{text-align:center;padding:8px 16px 20px;font-size:11px;color:var(--muted);}
    .si-footer span{color:var(--cyan);}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:20;
      background:rgba(9,10,16,0.97);backdrop-filter:blur(12px);
      border-top:1px solid rgba(255,255,255,0.06);
      display:flex;padding-bottom:env(safe-area-inset-bottom);}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:10px 4px 8px;text-decoration:none;color:var(--muted);
      font-size:10px;font-weight:600;letter-spacing:.3px;gap:3px;transition:color .2s;}
    .nav-item.active{color:var(--cyan);}
    .nav-icon{font-size:20px;}
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-row">
    <div class="topbar-logo">IN$DEX</div>
    <div class="si-curator">
      <span class="si-curator-dot"></span>
      Curated by SIINDEX · Synthetic Intelligence
    </div>
  </div>
  <div class="filter-scroll" id="filterRow">
    <button class="filter-chip active" onclick="setFilter(this,'all')">✨ All</button>
    <button class="filter-chip" onclick="setFilter(this,'local')">📍 Local</button>
    <button class="filter-chip" onclick="setFilter(this,'makers')">🛠 Makers</button>
    <button class="filter-chip" onclick="setFilter(this,'food')">🌿 Food</button>
    <button class="filter-chip" onclick="setFilter(this,'events')">🎟 Events</button>
    <button class="filter-chip" onclick="setFilter(this,'arts')">🎨 Arts</button>
    <button class="filter-chip" onclick="setFilter(this,'behind')">🎬 Behind-scenes</button>
  </div>
</header>

<main class="feed" id="feedContainer"></main>

<nav class="bottom-nav">
  <a href="home-v2.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
  <a href="marketplace.html" class="nav-item"><span class="nav-icon">🛒</span><span>Market</span></a>
  <a href="feed.html" class="nav-item active"><span class="nav-icon">✨</span><span>Feed</span></a>
  <a href="siindex-avatar.html" class="nav-item"><span class="nav-icon">🤖</span><span>SIINDEX</span></a>
  <!-- TODO: wallet.html does not exist; auto-fixed by bugfix agent 2026-07-08, review target (portfolio.html?) -->
  <a href="citizen-dashboard.html" class="nav-item"><span class="nav-icon">👛</span><span>Wallet</span></a>
</nav>

<script>
const INDX_PRICE_USD = 0.24;

// ── FEED DATA ──
const FEED_ITEMS = [
  {
    type:'story', filter:['all','local','makers'],
    creator:'Litia V.', loc:'Suva, Fiji', avi:'👩‍🎨',
    text:`I've been weaving tapa cloth since I was nine years old. My grandmother taught me. Each pattern is a word in a language most people have forgotten — I'm keeping it alive one piece at a time.`,
    product:{img:'🎨', title:'Tapa Cloth Wall Art', indx:85}
  },
  {
    type:'behind', filter:['all','makers','behind'],
    creator:'Seru M.', loc:'Suva, Fiji', avi:'👨‍🔧',
    bigEmoji:'🪵',
    text:`Day 3 of building a custom kauri workbench. Every joint is hand-cut — no screws, no shortcuts. This is how my father taught me. When I'm done, this bench will outlast both of us.`,
    product:{img:'⚙️', title:'Hardwood Workbench', indx:350}
  },
  {
    type:'trend', filter:['all','local'],
    items:[
      {rank:1, name:'Handmade jewellery', delta:'+41%'},
      {rank:2, name:'Local honey', delta:'+28%'},
      {rank:3, name:'Pacific tapa cloth', delta:'+36%'},
      {rank:4, name:'Organic coffee', delta:'+22%'},
      {rank:5, name:'Surfboard fins', delta:'+19%'},
    ]
  },
  {
    type:'story', filter:['all','food'],
    creator:'BeeKeepers Fiji', loc:'Nausori Highlands', avi:'🐝',
    text:`We lose 40% of people when we say "organic honey". They assume it's expensive. It's not. It's just made differently — no heating, no blending, no additives. Our bees are 12 hours from anything industrial.`,
    product:{img:'🍯', title:'Raw Pacific Wildflower Honey (500g)', indx:30}
  },
  {
    type:'event', filter:['all','local','events'],
    icon:'🌙', title:'Suva Night Market', when:'This Friday · 5pm–10pm',
    loc:'Suva Civic Centre, Fiji',
    desc:`40 local makers in one place. Food, craft, music, art. Free entry. INDX accepted at every stall — show your wallet and skip the EFTPOS queue.`,
    attending:127
  },
  {
    type:'story', filter:['all','arts'],
    creator:'Anare Art Studio', loc:'Pacific', avi:'🖼',
    text:`I stopped trying to explain my work in artist statements. Now I just show the process. This reef series took 14 months. I dove the same reef 60 times. You can see that time if you look closely enough.`,
    product:{img:'🖼', title:'Coral Reef Print — Limited Edition', indx:65}
  },
  {
    type:'behind', filter:['all','food','behind'],
    creator:'Highlands Roasters', loc:'PNG Highlands', avi:'☕',
    bigEmoji:'☕',
    text:`1,800 metres above sea level, the cherries take longer to ripen. That's the secret. Not the variety, not the process — the altitude. Every bag we sell comes from one farm, one season, one story.`,
    product:{img:'☕', title:'Single-Origin PNG Coffee (200g)', indx:18}
  },
  {
    type:'event', filter:['all','events','makers'],
    icon:'🛠', title:'Pacific Maker Workshop', when:'Saturday 23 Jul · 9am–2pm',
    loc:'Lautoka Community Centre, Fiji',
    desc:`Free workshop on turning your craft into a marketplace listing. Bring your product. SIINDEX coaches will help you write your title, description, and price — live.`,
    attending:43
  },
  {
    type:'story', filter:['all','makers','arts'],
    creator:'Pasifika Strings', loc:'Apia, Samoa', avi:'🎵',
    text:`Every ukulele starts as a raw piece of mahogany and a conversation. I ask what kind of music you play, how your hands are shaped, whether you sing. Then I build. Takes 3 weeks minimum. Can't be rushed.`,
    product:{img:'🎵', title:'Hand-carved Mahogany Ukulele', indx:160}
  },
  {
    type:'story', filter:['all','local','food'],
    creator:'Green Pacific', loc:'Fiji', avi:'🌿',
    text:`Moringa grows wild here. People walk past it every day and don't know it's one of the most nutrient-dense plants on Earth. We dry it slowly, cold-press it, and send it out. No middlemen. No story department.`,
    product:{img:'🌿', title:'Organic Moringa Powder (250g)', indx:22}
  },
  {
    type:'behind', filter:['all','arts','behind'],
    creator:'Ocean Gems', loc:'Apia, Samoa', avi:'💎',
    bigEmoji:'🦪',
    text:`Tahitian pearls take 2–3 years to grow. We check every one by hand before it leaves. The black lustre that makes them special — that's not a coating, that's the oyster's response to its environment. You can't fake it.`,
    product:{img:'💎', title:'Tahitian Pearl Drop Earrings', indx:180}
  },
];

let activeFilter = 'all';
let visibleCount = 7;

function setFilter(el, filter) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = filter;
  visibleCount = 7;
  renderFeed();
}

function renderFeed() {
  const container = document.getElementById('feedContainer');
  if (!container) return;

  const filtered = FEED_ITEMS.filter(item => activeFilter === 'all' || item.filter.includes(activeFilter));
  const shown = filtered.slice(0, visibleCount);

  container.innerHTML = shown.map((item, i) => renderItem(item, i)).join('') +
    (filtered.length > visibleCount ?
      `<button class="load-more-btn" onclick="loadMore()">Load more stories →</button>` : '') +
    `<div class="si-footer">Curated by <span>SIINDEX</span> · Synthetic Intelligence · Updates continuously</div>`;

  // Staggered card reveal
  requestAnimationFrame(() => {
    container.querySelectorAll('.story-card,.event-card,.behind-card,.trend-strip').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), i * 90);
    });
  });
}

function renderItem(item, i) {
  if (item.type === 'story') return renderStory(item);
  if (item.type === 'event') return renderEvent(item);
  if (item.type === 'behind') return renderBehind(item);
  if (item.type === 'trend') return renderTrend(item);
  return '';
}

function renderStory(item) {
  const usd = item.product ? (item.product.indx * INDX_PRICE_USD).toFixed(2) : null;
  const likeKey = `indx_feed_like_${item.creator.replace(/\s/g,'')}`;
  const liked = localStorage.getItem(likeKey);
  return `<article class="story-card">
    <div class="story-header">
      <div class="story-avi">${item.avi}</div>
      <div>
        <div class="creator-name">${item.creator}</div>
        <div class="creator-loc">📍 ${item.loc}</div>
      </div>
      <div class="card-type-badge">Story</div>
    </div>
    <p class="story-text">${item.text}</p>
    ${item.product ? `<div class="product-tag">
      <div class="product-tag-left">
        <div class="product-tag-img">${item.product.img}</div>
        <div>
          <div class="product-tag-title">${item.product.title}</div>
          <div class="product-tag-price">💎 ${item.product.indx} INDX · $${usd}</div>
        </div>
      </div>
      <button class="product-tag-btn" onclick="viewListing('${item.creator}')">View →</button>
    </div>` : ''}
  </article>`;
}

function renderEvent(item) {
  return `<article class="event-card">
    <div class="event-header">
      <div class="event-icon">${item.icon}</div>
      <div>
        <div class="event-title">${item.title}</div>
        <div class="event-when">🗓 ${item.when}</div>
        <div class="event-loc">📍 ${item.loc}</div>
      </div>
    </div>
    <p class="event-desc">${item.desc}</p>
    <div class="event-meta">
      <div class="event-attending"><strong>${item.attending}</strong> going</div>
      <button class="btn-event" onclick="rsvpEvent(this,'${item.title}')">RSVP →</button>
    </div>
  </article>`;
}

function renderBehind(item) {
  const usd = item.product ? (item.product.indx * INDX_PRICE_USD).toFixed(2) : null;
  return `<article class="behind-card">
    <div class="behind-visual">
      <div class="behind-big-emoji">${item.bigEmoji}</div>
      <div class="behind-label">Behind-the-scenes</div>
      <div class="behind-play" onclick="playBehind('${item.creator}')">▶</div>
    </div>
    <div class="behind-body">
      <div class="behind-creator">
        <div class="behind-avi">${item.avi}</div>
        <div>
          <div class="creator-name">${item.creator}</div>
          <div class="creator-loc">📍 ${item.loc}</div>
        </div>
      </div>
      <p class="behind-text">${item.text}</p>
      ${item.product ? `<div class="product-tag">
        <div class="product-tag-left">
          <div class="product-tag-img">${item.product.img}</div>
          <div>
            <div class="product-tag-title">${item.product.title}</div>
            <div class="product-tag-price">💎 ${item.product.indx} INDX · $${usd}</div>
          </div>
        </div>
        <button class="product-tag-btn" onclick="viewListing('${item.creator}')">View →</button>
      </div>` : ''}
    </div>
  </article>`;
}

function renderTrend(item) {
  return `<div class="trend-strip visible">
    <div class="trend-strip-label">
      <span class="trend-strip-dot"></span>
      Trending near you this week
    </div>
    <div class="trend-items">
      ${item.items.map(t => `<div class="trend-item">
        <span class="trend-rank">#${t.rank}</span>
        <span class="trend-name">${t.name}</span>
        <span class="trend-delta">${t.delta}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

function loadMore() {
  visibleCount += 4;
  renderFeed();
}

// ── INTERACTIONS ──
function viewListing(creator) {
  window.location.href = `marketplace.html`;
}

function rsvpEvent(btn, title) {
  const key = `indx_feed_rsvp_${title.replace(/\s/g,'')}`;
  if (localStorage.getItem(key)) {
    alert(`You're already going to ${title}. See you there.`);
    return;
  }
  localStorage.setItem(key, '1');
  btn.textContent = '✓ Going';
  btn.style.color = 'var(--green)';
  btn.style.borderColor = 'rgba(0,229,160,0.35)';
}

function playBehind(creator) {
  alert(`Video content from ${creator} coming in Wave 1.\n\nSave the listing now — it's live in the marketplace.`);
}

// ── SAVE SCROLL POSITION ──
function saveScroll() {
  localStorage.setItem('indx_feed_scroll', window.scrollY);
}
function restoreScroll() {
  const y = localStorage.getItem('indx_feed_scroll');
  if (y) window.scrollTo(0, parseInt(y));
}

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  renderFeed();
  setTimeout(restoreScroll, 100);
  window.addEventListener('scroll', saveScroll, {passive:true});
});
</script>
<script src="siindex-speak-core.js"></script>
</body>
</html>
