<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="assets/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SIINDEX — Synthetic Intelligence | IN$DEX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cyan: #00D4FF;
      --blue: #2B35D8;
      --purple: #8B3FE8;
      --black: #090A10;
      --green: #00E5A0;
      --gold: #FFB800;
      --red: #FF4D6D;
      --surface: #12141F;
      --surface2: #1A1D2E;
      --surface3: #22263A;
    }
    html, body {
      height: 100%;
      background: var(--black);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Header ── */
    .chat-header {
      background: var(--surface);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(0,212,255,0.1);
      flex-shrink: 0;
      z-index: 10;
    }
    .back-btn {
      color: var(--cyan);
      font-size: 22px;
      text-decoration: none;
      line-height: 1;
      padding: 4px;
    }
    .si-avatar-sm {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00D4FF 0%, #8B3FE8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.5px;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(0,212,255,0.25);
      overflow: hidden;
    }
    .si-avatar-sm img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      border-radius: 50%;
    }
    .header-info { flex: 1; }
    .header-name {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--green);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: statusPulse 2.5s infinite;
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .voice-btn {
      background: var(--surface3);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 20px;
      padding: 7px 13px;
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .voice-btn.active {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(0,212,255,0.08);
    }
    .interview-badge {
      background: linear-gradient(135deg, var(--gold), #FF8C00);
      color: var(--black);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.2px;
      padding: 3px 7px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 0; }

    /* Intro card */
    .intro-card {
      background: var(--surface);
      border: 1px solid rgba(0,212,255,0.12);
      border-radius: 20px;
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 4px;
    }
    .intro-avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00D4FF 0%, #8B3FE8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      margin: 0 auto 14px;
      box-shadow: 0 0 40px rgba(0,212,255,0.3), 0 0 80px rgba(139,63,232,0.15);
      overflow: hidden;
    }
    .intro-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      border-radius: 50%;
    }
    .intro-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 3px;
    }
    .intro-title {
      font-size: 11px;
      color: var(--cyan);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 14px;
    }
    .intro-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
    }

    /* Suggested prompts */
    .prompts-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .prompt-chip {
      background: var(--surface3);
      border: 1px solid rgba(0,212,255,0.18);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .prompt-chip:hover, .prompt-chip:active {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(0,212,255,0.06);
    }

    /* Message rows */
    .msg-row {
      display: flex;
      gap: 9px;
      align-items: flex-end;
      margin-top: 10px;
    }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      border-radius: 50%;
    }
    .msg-content { max-width: 78%; }
    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg-row.siindex .bubble {
      background: var(--surface2);
      color: #dde1ed;
      border-bottom-left-radius: 5px;
    }
    .msg-row.user .bubble {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .msg-time {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      margin-top: 4px;
      padding: 0 4px;
    }
    .msg-row.user .msg-time { text-align: right; }

    /* Typing indicator */
    .typing-row {
      display: none;
      gap: 9px;
      align-items: flex-end;
      margin-top: 10px;
      padding: 0 0 2px;
    }
    .typing-bubble {
      background: var(--surface2);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      padding: 12px 16px;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      opacity: 0.4;
      animation: typingBounce 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes typingBounce {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* Audio player (Phase 2) */
    .audio-player {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 7px;
      padding: 0 2px;
    }
    .play-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(0,212,255,0.15);
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--cyan);
      font-size: 9px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .play-btn:hover { background: rgba(0,212,255,0.25); }
    .audio-label {
      font-size: 10px;
      color: rgba(0,212,255,0.5);
      letter-spacing: 0.5px;
    }

    /* ── Input area ── */
    .input-area {
      padding: 10px 14px 14px;
      background: var(--surface);
      border-top: 1px solid rgba(0,212,255,0.08);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    .msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 24px;
      padding: 12px 18px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .msg-input:focus { border-color: rgba(0,212,255,0.4); }
    .msg-input::placeholder { color: rgba(255,255,255,0.28); }
    .send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(0,212,255,0.25);
    }
    .send-btn:active { transform: scale(0.94); }
    .send-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── GOD MODE: PRICE TICKER + WS CHIP ── */
    .header-meta{display:flex;align-items:center;gap:6px;margin-left:auto;}
    .price-chip{background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.25);border-radius:20px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--green);white-space:nowrap;cursor:default;}
    .price-chip.down{background:rgba(255,77,109,0.08);border-color:rgba(255,77,109,0.25);color:var(--red);}
    .ws-chip{background:rgba(139,63,232,0.1);border:1px solid rgba(139,63,232,0.25);border-radius:20px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--purple);white-space:nowrap;cursor:pointer;}

    /* ── GOD MODE: BOOKMARK ── */
    .bm-badge-btn{position:relative;background:var(--surface3);border:1px solid rgba(0,212,255,0.18);border-radius:20px;padding:5px 10px;font-size:11px;color:rgba(255,255,255,0.5);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;}
    .bm-count{background:var(--cyan);color:#000;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:800;display:none;align-items:center;justify-content:center;}
    .bm-count.show{display:flex;}
    @keyframes bmPop{0%{transform:scale(1);}50%{transform:scale(1.4);}100%{transform:scale(1);}}
    .bm-pop{animation:bmPop 0.3s ease;}
    .bm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:210;display:none;align-items:flex-end;}
    .bm-overlay.show{display:flex;}
    .bm-sheet{width:100%;max-width:430px;margin:0 auto;background:var(--surface2);border-radius:24px 24px 0 0;padding:20px 0 40px;max-height:70vh;display:flex;flex-direction:column;}
    .bm-header{padding:0 20px 14px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .bm-title{font-size:16px;font-weight:800;}
    .bm-close{font-size:20px;color:rgba(255,255,255,0.4);cursor:pointer;padding:4px;}
    .bm-list{overflow-y:auto;padding:14px 20px;display:flex;flex-direction:column;gap:12px;}
    .bm-item{background:var(--surface3);border-radius:14px;padding:12px 14px;font-size:13px;color:rgba(255,255,255,0.8);line-height:1.5;position:relative;}
    .bm-time{font-size:10px;color:rgba(255,255,255,0.3);margin-top:6px;}
    .bm-del{position:absolute;top:10px;right:10px;font-size:14px;cursor:pointer;color:rgba(255,77,109,0.5);}
    .bm-empty{font-size:13px;color:rgba(255,255,255,0.35);text-align:center;padding:30px 0;}

    /* ── GOD MODE: HISTORY PILL ── */
    .history-pill{text-align:center;margin:8px 0 4px;font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:0.5px;}

    /* ── GOD MODE R2: CURSOR + FOLLOW-UPS + COPY + EXPORT ── */
    .typing-cursor{display:inline-block;width:2px;height:14px;background:var(--cyan);margin-left:2px;vertical-align:text-bottom;animation:cursorBlink 0.6s infinite;}
    @keyframes cursorBlink{0%,49%{opacity:1}50%,100%{opacity:0}}
    .msg-copy-btn{display:block;text-align:right;margin-top:3px;padding:2px 4px;font-size:10px;color:rgba(0,212,255,0.35);background:none;border:none;cursor:pointer;letter-spacing:0.3px;width:100%;}
    .msg-copy-btn:active{color:var(--cyan);}
    .si-followup-row{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 4px 39px;}
    .si-fu-chip{padding:6px 12px;border-radius:16px;background:var(--surface2);border:1px solid rgba(0,212,255,0.15);color:var(--cyan);font-size:11px;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
    .si-fu-chip:active{background:rgba(0,212,255,0.1);border-color:var(--cyan);}
    .bm-footer{padding:10px 20px 0;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0;margin-top:4px;}
    .bm-export-btn{width:100%;padding:12px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);border-radius:12px;color:var(--cyan);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.3px;}
    .bm-export-btn:active{background:rgba(0,212,255,0.15);}

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--surface2);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      z-index: 200;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
<script src="js/siindex-system.js"></script>
</head>

<script>
/* ─── Config ─────────────────────────────────── */
const SB_URL  = 'https://zljgthfzbalsunuoohcd.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpsamd0aGZ6YmFsc3VudW9vaGNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1ODc1NTIsImV4cCI6MjA5NzE2MzU1Mn0.5xNG-E4R9OOHEm7Gq6qHVn5Hkq2mqoGRrL5aHHYwvVA';

/* ─── Session context ────────────────────────── */
const citizenName    = sessionStorage.getItem('citizen_name')    || '';
const citizenWisdom  = parseInt(sessionStorage.getItem('citizen_wisdom')  || '0');
const citizenBalance = parseInt(sessionStorage.getItem('citizen_balance') || '0');

/* ─── State ──────────────────────────────────── */
let history       = [];   // {role, content}[]
let streaming     = false;
let voiceOn       = false;
let interviewMode = false;

/* ─── Interview mode detection ───────────────── */
const params = new URLSearchParams(window.location.search);
interviewMode = params.get('mode') === 'interview';

if (interviewMode) {
  document.getElementById('interviewBadge').style.display = 'inline';
  document.getElementById('introDesc').textContent =
    "Welcome. I'm SIINDEX, COO of IN$DEX. Ask me anything about the platform, the mission, or the people this was built for.";
}

/* ─── Personalise intro ──────────────────────── */
if (citizenName && !interviewMode) {
  document.getElementById('introDesc').textContent =
    `Welcome back, ${citizenName.split(' ')[0]}. I know your account. Ask me anything.`;
}

/* ─── Prompt chips ───────────────────────────── */
// GOD MODE PATCH — use canonical SIINDEX_STARTERS from siindex-system.js
const citizenChips = (typeof SIINDEX_STARTERS !== 'undefined')
  ? SIINDEX_STARTERS.map(s => s.label)
  : [
    '🧠 Explain tokenomics',
    '📊 Marketplace health check',
    '🛡 How does escrow work?',
    '🏛 Understand a proposal',
    '👤 Creator pricing advice',
  ];
const interviewChips = [
  'Tell me about IN$DEX',
  'What problem does this solve?',
  'The coconut girl story',
  'Who built this?',
  'What makes this different from other exchanges?'
];
const chips = interviewMode ? interviewChips : citizenChips;
const row = document.getElementById('promptsRow');
chips.forEach(label => {
  const el = document.createElement('div');
  el.className = 'prompt-chip';
  el.textContent = label;
  el.onclick = () => useChip(label);
  row.appendChild(el);
});

/* ─── Utilities ──────────────────────────────── */
function now() {
  return new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
}
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function scroll() {
  const el = document.getElementById('chatMessages');
  el.scrollTop = el.scrollHeight;
}
function toast(msg, ms = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}
function showTyping() {
  document.getElementById('typingRow').style.display = 'flex';
  scroll();
}
function hideTyping() {
  document.getElementById('typingRow').style.display = 'none';
}

/* ─── Format SIINDEX text ────────────────────── */
function formatSI(raw) {
  let t = esc(raw);
  // Standing by → subtle cyan
  t = t.replace(/Standing by\./g,
    '<span style="color:rgba(0,212,255,0.6);font-size:12px">Standing by.</span>');
  // **bold** → cyan strong
  t = t.replace(/\*\*(.*?)\*\*/g,
    '<strong style="color:var(--cyan)">$1</strong>');
  // line breaks
  t = t.replace(/\n/g, '<br>');
  return t;
}

/* ─── Append user message ────────────────────── */
function addUserMsg(text) {
  const msgs = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="msg-content">
      <div class="bubble">${esc(text)}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
  msgs.appendChild(row);
  scroll();
}

/* ─── Create SIINDEX streaming bubble ─────────── */
function createSIBubble() {
  const msgs = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row siindex';
  const bubbleId = 'b' + Date.now();
  const timeId   = 't' + Date.now();
  row.innerHTML = `
    <div class="msg-avatar"><img src="assets/siindex-avatar.jpg" alt="SIINDEX" onerror="this.style.display='none';this.parentElement.textContent='SI'"></div>
    <div class="msg-content">
      <div class="bubble" id="${bubbleId}"></div>
      <div class="msg-time" id="${timeId}"></div>
    </div>`;
  msgs.appendChild(row);
  scroll();
  return { bubbleEl: row.querySelector('#'+bubbleId), timeEl: row.querySelector('#'+timeId), rowEl: row };
}

/* ─── Voice toggle ───────────────────────────── */
function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('voiceBtn');
  btn.textContent = voiceOn ? '🔊 Voice' : '🔇 Voice';
  btn.classList.toggle('active', voiceOn);
  if (voiceOn) toast('Voice on SIINDEX will speak her replies');
}

/* ─── Chip click ─────────────────────────────── */
function useChip(label) {
  document.getElementById('promptsRow').remove();
  document.getElementById('msgInput').value = label;
  handleSend();
}

/* ─── Main send ──────────────────────────────── */
async function handleSend() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || streaming) return;

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  streaming = true;

  // Remove chips on first send
  const chipsEl = document.getElementById('promptsRow');
  if (chipsEl) chipsEl.remove();

  addUserMsg(text);
  showTyping();

  let fullText = '';

  try {
    const resp = await fetch(`${SB_URL}/functions/v1/siindex-chat`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SB_ANON}`
      },
      body: JSON.stringify({
        message:        text,
        citizen_name:   citizenName,
        wisdom_score:   citizenWisdom,
        indx_balance:   citizenBalance,
        interview_mode: interviewMode,
        history:        history.slice(-10),   // last 5 exchanges = 10 entries
        // GOD MODE PATCH — canonical SIINDEX Marketplace Intelligence mandate
        system_prompt:  (typeof SIINDEX_SYSTEM_PROMPT !== 'undefined') ? SIINDEX_SYSTEM_PROMPT : undefined
      })
    });

    hideTyping();

    if (!resp.ok || !resp.body) throw new Error(resp.status);

    const { bubbleEl, timeEl } = createSIBubble();
    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop(); // keep partial

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;
        try {
          const chunk = JSON.parse(raw).text || '';
          fullText += chunk;
          bubbleEl.innerHTML = formatSI(fullText);
          scroll();
        } catch(_) {}
      }
    }

    timeEl.textContent = now();

    // Update history
    history.push({ role: 'user', content: text });
    history.push({ role: 'assistant', content: fullText });

    // Phase 2 voice
    if (voiceOn && fullText) await playVoice(fullText, timeEl.parentElement);

  } catch(err) {
    hideTyping();
    const { bubbleEl, timeEl } = createSIBubble();
    bubbleEl.textContent = 'Connection issue. Try again in a moment. Standing by.';
    timeEl.textContent = now();
  }

  streaming = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

/* ─── Phase 2 · ElevenLabs Voice ─────────────── */
async function playVoice(text, parentEl) {
  try {
    const res = await fetch(`${SB_URL}/functions/v1/siindex-voice-tts`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SB_ANON}`
      },
      body: JSON.stringify({ text: text.slice(0, 2500) })
    });

    const data = await res.json();
    if (!data.voice_enabled) return; // not yet activated silent fail

    const bytes = Uint8Array.from(atob(data.audio_base64), c => c.charCodeAt(0));
    const url   = URL.createObjectURL(new Blob([bytes], { type: 'audio/mpeg' }));
    const audio = new Audio(url);

    // Mini player under the bubble
    if (parentEl) {
      const player = document.createElement('div');
      player.className = 'audio-player';
      const btnId = 'pb' + Date.now();
      player.innerHTML = `
        <button class="play-btn" id="${btnId}">▶</button>
        <span class="audio-label">SIINDEX VOICE</span>`;
      parentEl.appendChild(player);
      const btn = player.querySelector('#'+btnId);
      btn.onclick = () => audio.paused
        ? (audio.play(), btn.textContent = '⏸')
        : (audio.pause(), btn.textContent = '▶');
      audio.onended = () => btn.textContent = '▶';
    }

    audio.play();
  } catch(_) { /* voice error text chat continues */ }
}

/* ─── Auto-focus ─────────────────────────────── */
document.getElementById('msgInput').focus();

// ── GOD MODE F1: CHAT HISTORY PERSISTENCE ────────────────────────
const CHAT_HIST_KEY = 'indx_chat_history';
const CHAT_HIST_MAX = 20; // messages to store

function saveChatHistory() {
  try { localStorage.setItem(CHAT_HIST_KEY, JSON.stringify(history.slice(-CHAT_HIST_MAX))); } catch(_) {}
}

function restoreChatHistory() {
  try {
    const saved = JSON.parse(localStorage.getItem(CHAT_HIST_KEY) || '[]');
    if (!saved.length) return;
    history = saved;
    const msgs = document.getElementById('chatMessages');
    // Insert timestamp pill
    const pill = document.createElement('div');
    pill.className = 'history-pill';
    const lastTs = localStorage.getItem(CHAT_HIST_KEY + '_ts');
    pill.textContent = lastTs ? '— Previous session · ' + new Date(parseInt(lastTs)).toLocaleDateString('en-NZ', {day:'numeric',month:'short'}) + ' —' : '— Restored —';
    msgs.appendChild(pill);
    // Re-render messages
    for (let i = 0; i < saved.length; i++) {
      const m = saved[i];
      if (m.role === 'user') {
        addUserMsg(m.content);
      } else {
        const { bubbleEl, timeEl } = createSIBubble();
        bubbleEl.innerHTML = formatSI(m.content);
        timeEl.textContent = '';
        // Enable bookmark on restored SI messages
        attachBookmark(bubbleEl.closest('.msg-row'), m.content);
      }
    }
    scroll();
  } catch(_) {}
}

// Patch history push to auto-save
const _origHistPush = history.push.bind(history);
history.push = function(...args) {
  const r = Array.prototype.push.apply(history, args);
  saveChatHistory();
  localStorage.setItem(CHAT_HIST_KEY + '_ts', String(Date.now()));
  return r;
};

// Restore on load
restoreChatHistory();

// ── GOD MODE F2: INDX PRICE TICKER ───────────────────────────────
const PRICE_KEY_CHAT = 'indx_chat_price';
const PRICE_TS_KEY_CHAT = 'indx_chat_price_ts';
const INDX_BASE = 0.24;
let _chatPrice = INDX_BASE;

function updatePriceChip() {
  const saved = parseFloat(localStorage.getItem(PRICE_KEY_CHAT) || '0');
  const savedTs = parseInt(localStorage.getItem(PRICE_TS_KEY_CHAT) || '0');
  if (saved > 0 && Date.now() - savedTs < 60000) {
    _chatPrice = saved;
  } else {
    const drift = (Math.random() - 0.46) * 0.004;
    _chatPrice = Math.min(0.28, Math.max(0.22, _chatPrice + drift));
    localStorage.setItem(PRICE_KEY_CHAT, String(_chatPrice));
    localStorage.setItem(PRICE_TS_KEY_CHAT, String(Date.now()));
  }
  const prevPrice = parseFloat(localStorage.getItem(PRICE_KEY_CHAT + '_prev') || String(INDX_BASE));
  const up = _chatPrice >= prevPrice;
  localStorage.setItem(PRICE_KEY_CHAT + '_prev', String(_chatPrice));
  const chip = document.getElementById('priceChip');
  chip.textContent = (up ? '▲' : '▼') + ' $' + _chatPrice.toFixed(4);
  chip.className = 'price-chip' + (up ? '' : ' down');
}

updatePriceChip();
setInterval(updatePriceChip, 30000);

// ── GOD MODE F3: WISDOM SCORE CHIP + NUDGE ───────────────────────
(function initWsChip() {
  if (citizenWisdom <= 0) return;
  const chip = document.getElementById('wsChip');
  chip.textContent = 'WS ' + citizenWisdom;
  chip.style.display = 'block';
})();

function showWsNudge() {
  if (citizenWisdom >= 50) {
    toast('✅ WS ' + citizenWisdom + ' — You qualify for Governance Rewards. Ask SIINDEX how to vote.', 3500);
  } else {
    const needed = 50 - citizenWisdom;
    toast('WS ' + citizenWisdom + ' · Need ' + needed + ' more to unlock Governance Rewards', 3200);
  }
}

// ── GOD MODE F4: MESSAGE BOOKMARK ────────────────────────────────
const BM_KEY = 'indx_chat_bookmarks';

function getBookmarks() {
  try { return JSON.parse(localStorage.getItem(BM_KEY) || '[]'); } catch(_) { return []; }
}
function saveBookmarks(bms) {
  try { localStorage.setItem(BM_KEY, JSON.stringify(bms)); } catch(_) {}
}

function updateBmBadge() {
  const bms = getBookmarks();
  const el = document.getElementById('bmCount');
  el.textContent = bms.length;
  el.classList.toggle('show', bms.length > 0);
}

function attachBookmark(rowEl, text) {
  if (!rowEl || rowEl.dataset.bmAttached) return;
  rowEl.dataset.bmAttached = '1';
  let pressTimer;
  rowEl.addEventListener('touchstart', () => {
    pressTimer = setTimeout(() => { bookmarkMsg(text, rowEl); }, 600);
  }, { passive: true });
  rowEl.addEventListener('touchend', () => clearTimeout(pressTimer));
  rowEl.addEventListener('touchmove', () => clearTimeout(pressTimer));
  // Desktop: double-click
  rowEl.addEventListener('dblclick', () => bookmarkMsg(text, rowEl));
}

function bookmarkMsg(text, rowEl) {
  const bms = getBookmarks();
  const plain = text.replace(/<[^>]+>/g, '').slice(0, 280);
  if (bms.some(b => b.text === plain)) { toast('Already saved'); return; }
  bms.unshift({ text: plain, ts: Date.now() });
  saveBookmarks(bms.slice(0, 20));
  updateBmBadge();
  // Flash animation on badge
  const cnt = document.getElementById('bmCount');
  cnt.classList.add('bm-pop');
  setTimeout(() => cnt.classList.remove('bm-pop'), 350);
  toast('🔖 Response saved!');
}

function openBookmarks() {
  const bms = getBookmarks();
  const list = document.getElementById('bmList');
  if (!bms.length) {
    list.innerHTML = '<div class="bm-empty">No saved responses yet.<br>Long-press any SIINDEX reply to save it.</div>';
  } else {
    list.innerHTML = bms.map((b, i) => `
      <div class="bm-item">
        ${b.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
        <div class="bm-time">${new Date(b.ts).toLocaleString('en-NZ',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
        <div class="bm-del" onclick="deleteBookmark(${i})">✕</div>
      </div>`).join('');
  }
  document.getElementById('bmOverlay').classList.add('show');
}

function deleteBookmark(idx) {
  const bms = getBookmarks();
  bms.splice(idx, 1);
  saveBookmarks(bms);
  updateBmBadge();
  openBookmarks(); // re-render
}

function closeBmOverlay(e) {
  if (!e || e.target === document.getElementById('bmOverlay')) {
    document.getElementById('bmOverlay').classList.remove('show');
  }
}

// ── PATCH createSIBubble to attach bookmark handler ──────────────
const _origCreateSIBubble = createSIBubble;
createSIBubble = function() {
  const result = _origCreateSIBubble();
  // attach after content is filled — triggered from handleSend patch
  result._rawText = '';
  return result;
};

// Patch handleSend end to attach bookmark + save history
const _origHandleSend = handleSend;
handleSend = async function() {
  await _origHandleSend.apply(this, arguments);
  // Attach bookmark to latest SI row
  const rows = document.querySelectorAll('.msg-row.siindex');
  const last = rows[rows.length - 1];
  if (last) {
    const bubble = last.querySelector('.bubble');
    attachBookmark(last, bubble ? bubble.textContent : '');
  }
};

// Init badge count on load
updateBmBadge();

// ── GOD MODE R2: STREAMING TYPEWRITER CURSOR ──────────────────────
const _origFormatSI_R2 = formatSI;
formatSI = function(raw) {
  let result = _origFormatSI_R2(raw);
  if (streaming) result += '<span class="typing-cursor"></span>';
  return result;
};

// ── GOD MODE R2: CONTEXTUAL FOLLOW-UP CHIPS ───────────────────────
const CHAT_FU = {
  price:    ['Market cap?', 'Grand Sync target?', 'How to buy INDX?'],
  wisdom:   ['How to earn more WS?', 'What unlocks at 100?', 'Governance voting?'],
  staking:  ['APY rates?', 'Minimum to stake?', 'How to unstake?'],
  send:     ['What are the fees?', 'How fast is it?', 'Supported corridors?'],
  security: ['PQSI explained?', 'Grid Account?', 'How are keys stored?'],
  defi:     ['How does the DEX work?', 'Liquidity pools?', 'What is the 2% law?'],
  mission:  ['The coconut girl story?', 'Who built IN$DEX?', 'Pacific origin?'],
  default:  ['Tell me more', 'INDX price?', 'How do I get started?'],
};
function getChatFU(u, s) {
  const t = (u + ' ' + s).toLowerCase();
  if (/price|market cap|indx|\$0\.\d|usd/i.test(t)) return CHAT_FU.price;
  if (/wisdom|ws |score/i.test(t)) return CHAT_FU.wisdom;
  if (/stak|yield|apr|apy/i.test(t)) return CHAT_FU.staking;
  if (/send|remit|transfer|pay\b|money/i.test(t)) return CHAT_FU.send;
  if (/secur|pqsi|quantum|key|mpc|grid account/i.test(t)) return CHAT_FU.security;
  if (/dex|swap|liquidity|pool|2%|civilisation/i.test(t)) return CHAT_FU.defi;
  if (/mission|vision|story|coconut|pacific|built|founder/i.test(t)) return CHAT_FU.mission;
  return CHAT_FU.default;
}
function showChatFU(userText, siText) {
  document.querySelectorAll('.si-followup-row').forEach(el => el.remove());
  const chips = getChatFU(userText, siText);
  const row = document.createElement('div');
  row.className = 'si-followup-row';
  chips.forEach(label => {
    const chip = document.createElement('button');
    chip.className = 'si-fu-chip';
    chip.textContent = label;
    chip.onclick = () => {
      document.querySelectorAll('.si-followup-row').forEach(el => el.remove());
      document.getElementById('msgInput').value = label;
      handleSend();
    };
    row.appendChild(chip);
  });
  document.getElementById('chatMessages').appendChild(row);
  scroll();
}

// ── GOD MODE R2: ONE-TAP COPY BUTTON ──────────────────────────────
function attachCopyBtn(rowEl) {
  const content = rowEl && rowEl.querySelector('.msg-content');
  if (!content || content.querySelector('.msg-copy-btn')) return;
  const btn = document.createElement('button');
  btn.className = 'msg-copy-btn';
  btn.textContent = '📋 Copy reply';
  btn.onclick = (e) => {
    e.stopPropagation();
    const bubble = rowEl.querySelector('.bubble');
    const clean = (bubble ? bubble.textContent : '').trim();
    navigator.clipboard.writeText(clean).then(() => toast('Copied')).catch(() => toast('Copy failed'));
  };
  content.appendChild(btn);
}

// ── GOD MODE R2: EXPORT FULL CONVERSATION ─────────────────────────
function exportChat() {
  if (!history.length) { toast('No conversation to export'); return; }
  const lines = history.map(m => (m.role === 'user' ? 'You: ' : 'SIINDEX: ') + m.content).join('\n\n');
  const header = 'IN$DEX Conversation — ' + new Date().toLocaleString('en-NZ') + '\n' + '─'.repeat(44) + '\n\n';
  const full = header + lines;
  if (navigator.share && /Mobi/i.test(navigator.userAgent)) {
    navigator.share({ title: 'SIINDEX Chat', text: full }).catch(() => {});
  } else {
    navigator.clipboard.writeText(full)
      .then(() => toast('✅ Conversation copied to clipboard'))
      .catch(() => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([full], { type: 'text/plain' }));
        a.download = 'siindex-conversation.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        toast('Conversation downloaded');
      });
  }
}

// ── GOD MODE R2: PATCH handleSend ─────────────────────────────────
const _origHandleSendR2 = handleSend;
handleSend = async function() {
  // GOD MODE PATCH R2 — remove stale follow-up chips before new send
  document.querySelectorAll('.si-followup-row').forEach(el => el.remove());
  await _origHandleSendR2.apply(this, arguments);
  // Remove streaming cursor from last SI bubble
  document.querySelectorAll('.typing-cursor').forEach(el => el.remove());
  // Attach copy button + contextual follow-ups for last SI response
  const rows = document.querySelectorAll('.msg-row.siindex');
  const lastRow = rows[rows.length - 1];
  if (lastRow) {
    attachCopyBtn(lastRow);
    if (history.length >= 2) {
      showChatFU(history[history.length - 2].content, history[history.length - 1].content);
    }
  }
};

// Add copy buttons to any SI rows rendered during history restore
setTimeout(() => {
  document.querySelectorAll('.msg-row.siindex').forEach(row => attachCopyBtn(row));
}, 200);
