<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="assets/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SIINDEX Sovereign SI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cyan: #00D4FF;
      --blue: #2B35D8;
      --purple: #8B3FE8;
      --black: #090A10;
      --green: #00E5A0;
      --gold: #FFB800;
      --red: #FF4D6D;
      --surface: #12141F;
      --surface2: #1A1D2E;
      --surface3: #22263A;
    }
    html, body {
      height: 100%;
      background: var(--black);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    .app {
      max-width: 430px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Header ── */
    .chat-header {
      background: var(--surface);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(0,212,255,0.1);
      flex-shrink: 0;
      z-index: 10;
    }
    .back-btn {
      color: var(--cyan);
      font-size: 22px;
      text-decoration: none;
      line-height: 1;
      padding: 4px;
    }
    .si-avatar-sm {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00D4FF 0%, #8B3FE8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.5px;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(0,212,255,0.25);
      overflow: hidden;
    }
    .si-avatar-sm img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      border-radius: 50%;
    }
    .header-info { flex: 1; }
    .header-name {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--green);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: statusPulse 2.5s infinite;
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .voice-btn {
      background: var(--surface3);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 20px;
      padding: 7px 13px;
      color: rgba(255,255,255,0.45);
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .voice-btn.active {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(0,212,255,0.08);
    }
    .interview-badge {
      background: linear-gradient(135deg, var(--gold), #FF8C00);
      color: var(--black);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1.2px;
      padding: 3px 7px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    /* ── Messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 0; }

    /* Intro card */
    .intro-card {
      background: var(--surface);
      border: 1px solid rgba(0,212,255,0.12);
      border-radius: 20px;
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 4px;
    }
    .intro-avatar {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00D4FF 0%, #8B3FE8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      margin: 0 auto 14px;
      box-shadow: 0 0 40px rgba(0,212,255,0.3), 0 0 80px rgba(139,63,232,0.15);
      overflow: hidden;
    }
    .intro-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      border-radius: 50%;
    }
    .intro-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 3px;
    }
    .intro-title {
      font-size: 11px;
      color: var(--cyan);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 14px;
    }
    .intro-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
    }

    /* Suggested prompts */
    .prompts-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .prompt-chip {
      background: var(--surface3);
      border: 1px solid rgba(0,212,255,0.18);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .prompt-chip:hover, .prompt-chip:active {
      border-color: var(--cyan);
      color: var(--cyan);
      background: rgba(0,212,255,0.06);
    }

    /* Message rows */
    .msg-row {
      display: flex;
      gap: 9px;
      align-items: flex-end;
      margin-top: 10px;
    }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      border-radius: 50%;
    }
    .msg-content { max-width: 78%; }
    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg-row.siindex .bubble {
      background: var(--surface2);
      color: #dde1ed;
      border-bottom-left-radius: 5px;
    }
    .msg-row.user .bubble {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .msg-time {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      margin-top: 4px;
      padding: 0 4px;
    }
    .msg-row.user .msg-time { text-align: right; }

    /* Typing indicator */
    .typing-row {
      display: none;
      gap: 9px;
      align-items: flex-end;
      margin-top: 10px;
      padding: 0 0 2px;
    }
    .typing-bubble {
      background: var(--surface2);
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      padding: 12px 16px;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      opacity: 0.4;
      animation: typingBounce 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes typingBounce {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* Audio player (Phase 2) */
    .audio-player {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 7px;
      padding: 0 2px;
    }
    .play-btn {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(0,212,255,0.15);
      border: 1px solid rgba(0,212,255,0.3);
      color: var(--cyan);
      font-size: 9px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .play-btn:hover { background: rgba(0,212,255,0.25); }
    .audio-label {
      font-size: 10px;
      color: rgba(0,212,255,0.5);
      letter-spacing: 0.5px;
    }

    /* ── Input area ── */
    .input-area {
      padding: 10px 14px 14px;
      background: var(--surface);
      border-top: 1px solid rgba(0,212,255,0.08);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    .msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 24px;
      padding: 12px 18px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .msg-input:focus { border-color: rgba(0,212,255,0.4); }
    .msg-input::placeholder { color: rgba(255,255,255,0.28); }
    .send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--blue));
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(0,212,255,0.25);
    }
    .send-btn:active { transform: scale(0.94); }
    .send-btn:disabled { opacity: 0.35; cursor: default; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--surface2);
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      z-index: 200;
      opacity: 0;
      transition: all 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="chat-header">
    <a href="citizen-dashboard.html" class="back-btn">←</a>
    <div class="si-avatar-sm"><img src="assets/siindex-avatar.jpg" alt="SIINDEX" onerror="this.style.display='none';this.parentElement.textContent='SI'"></div>
    <div class="header-info">
      <div class="header-name">
        SIINDEX
        <span class="interview-badge" id="interviewBadge" style="display:none">INTERVIEW</span>
      </div>
      <div class="header-status">
        <div class="status-dot"></div>
        Sovereign SI · Online
      </div>
    </div>
    <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">🔇 Voice</button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chatMessages">

    <div class="intro-card" id="introCard">
      <div class="intro-avatar"><img src="assets/siindex-avatar.jpg" alt="SIINDEX" onerror="this.style.display='none';this.parentElement.textContent='SI'"></div>
      <div class="intro-name">SIINDEX</div>
      <div class="intro-title">Sovereign SI · COO · IN$DEX</div>
      <div class="intro-desc" id="introDesc">
        Ask me anything about IN$DEX how to get started, how to send money, what your Wisdom Score means, or how the platform works.
      </div>
    </div>

    <div class="prompts-row" id="promptsRow">
      <!-- populated by JS -->
    </div>

  </div>

  <!-- Typing indicator -->
  <div class="typing-row" id="typingRow" style="padding: 0 14px 6px;">
    <div class="msg-avatar"><img src="assets/siindex-avatar.jpg" alt="SIINDEX" onerror="this.style.display='none';this.parentElement.textContent='SI'"></div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <input type="text" id="msgInput" class="msg-input"
      placeholder="Ask SIINDEX anything..."
      maxlength="500"
      autocomplete="off"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleSend();}">
    <button class="send-btn" id="sendBtn" onclick="handleSend()">➤</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ─── Config ─────────────────────────────────── */
const SB_URL  = 'https://zljgthfzbalsunuoohcd.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpsamd0aGZ6YmFsc3VudW9vaGNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1ODc1NTIsImV4cCI6MjA5NzE2MzU1Mn0.5xNG-E4R9OOHEm7Gq6qHVn5Hkq2mqoGRrL5aHHYwvVA';

/* ─── Session context ────────────────────────── */
const citizenName    = sessionStorage.getItem('citizen_name')    || '';
const citizenWisdom  = parseInt(sessionStorage.getItem('citizen_wisdom')  || '0');
const citizenBalance = parseInt(sessionStorage.getItem('citizen_balance') || '0');

/* ─── State ──────────────────────────────────── */
let history       = [];   // {role, content}[]
let streaming     = false;
let voiceOn       = false;
let interviewMode = false;

/* ─── Interview mode detection ───────────────── */
const params = new URLSearchParams(window.location.search);
interviewMode = params.get('mode') === 'interview';

if (interviewMode) {
  document.getElementById('interviewBadge').style.display = 'inline';
  document.getElementById('introDesc').textContent =
    "Welcome. I'm SIINDEX, COO of IN$DEX. Ask me anything about the platform, the mission, or the people this was built for.";
}

/* ─── Personalise intro ──────────────────────── */
if (citizenName && !interviewMode) {
  document.getElementById('introDesc').textContent =
    `Welcome back, ${citizenName.split(' ')[0]}. I know your account. Ask me anything.`;
}

/* ─── Prompt chips ───────────────────────────── */
const citizenChips = [
  'What is IN$DEX?',
  'How do I send money?',
  'What is my Wisdom Score?',
  'How does staking work?',
  'How is this different from a bank?'
];
const interviewChips = [
  'Tell me about IN$DEX',
  'What problem does this solve?',
  'The coconut girl story',
  'Who built this?',
  'What makes this different from other exchanges?'
];
const chips = interviewMode ? interviewChips : citizenChips;
const row = document.getElementById('promptsRow');
chips.forEach(label => {
  const el = document.createElement('div');
  el.className = 'prompt-chip';
  el.textContent = label;
  el.onclick = () => useChip(label);
  row.appendChild(el);
});

/* ─── Utilities ──────────────────────────────── */
function now() {
  return new Date().toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
}
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function scroll() {
  const el = document.getElementById('chatMessages');
  el.scrollTop = el.scrollHeight;
}
function toast(msg, ms = 2800) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}
function showTyping() {
  document.getElementById('typingRow').style.display = 'flex';
  scroll();
}
function hideTyping() {
  document.getElementById('typingRow').style.display = 'none';
}

/* ─── Format SIINDEX text ────────────────────── */
function formatSI(raw) {
  let t = esc(raw);
  // Standing by → subtle cyan
  t = t.replace(/Standing by\./g,
    '<span style="color:rgba(0,212,255,0.6);font-size:12px">Standing by.</span>');
  // **bold** → cyan strong
  t = t.replace(/\*\*(.*?)\*\*/g,
    '<strong style="color:var(--cyan)">$1</strong>');
  // line breaks
  t = t.replace(/\n/g, '<br>');
  return t;
}

/* ─── Append user message ────────────────────── */
function addUserMsg(text) {
  const msgs = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="msg-content">
      <div class="bubble">${esc(text)}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
  msgs.appendChild(row);
  scroll();
}

/* ─── Create SIINDEX streaming bubble ─────────── */
function createSIBubble() {
  const msgs = document.getElementById('chatMessages');
  const row = document.createElement('div');
  row.className = 'msg-row siindex';
  const bubbleId = 'b' + Date.now();
  const timeId   = 't' + Date.now();
  row.innerHTML = `
    <div class="msg-avatar"><img src="assets/siindex-avatar.jpg" alt="SIINDEX" onerror="this.style.display='none';this.parentElement.textContent='SI'"></div>
    <div class="msg-content">
      <div class="bubble" id="${bubbleId}"></div>
      <div class="msg-time" id="${timeId}"></div>
    </div>`;
  msgs.appendChild(row);
  scroll();
  return { bubbleEl: row.querySelector('#'+bubbleId), timeEl: row.querySelector('#'+timeId), rowEl: row };
}

/* ─── Voice toggle ───────────────────────────── */
function toggleVoice() {
  voiceOn = !voiceOn;
  const btn = document.getElementById('voiceBtn');
  btn.textContent = voiceOn ? '🔊 Voice' : '🔇 Voice';
  btn.classList.toggle('active', voiceOn);
  if (voiceOn) toast('Voice on SIINDEX will speak her replies');
}

/* ─── Chip click ─────────────────────────────── */
function useChip(label) {
  document.getElementById('promptsRow').remove();
  document.getElementById('msgInput').value = label;
  handleSend();
}

/* ─── Main send ──────────────────────────────── */
async function handleSend() {
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text || streaming) return;

  input.value = '';
  document.getElementById('sendBtn').disabled = true;
  streaming = true;

  // Remove chips on first send
  const chipsEl = document.getElementById('promptsRow');
  if (chipsEl) chipsEl.remove();

  addUserMsg(text);
  showTyping();

  let fullText = '';

  try {
    const resp = await fetch(`${SB_URL}/functions/v1/siindex-chat`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SB_ANON}`
      },
      body: JSON.stringify({
        message:        text,
        citizen_name:   citizenName,
        wisdom_score:   citizenWisdom,
        indx_balance:   citizenBalance,
        interview_mode: interviewMode,
        history:        history.slice(-10)   // last 5 exchanges = 10 entries
      })
    });

    hideTyping();

    if (!resp.ok || !resp.body) throw new Error(resp.status);

    const { bubbleEl, timeEl } = createSIBubble();
    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop(); // keep partial

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') break;
        try {
          const chunk = JSON.parse(raw).text || '';
          fullText += chunk;
          bubbleEl.innerHTML = formatSI(fullText);
          scroll();
        } catch(_) {}
      }
    }

    timeEl.textContent = now();

    // Update history
    history.push({ role: 'user', content: text });
    history.push({ role: 'assistant', content: fullText });

    // Phase 2 voice
    if (voiceOn && fullText) await playVoice(fullText, timeEl.parentElement);

  } catch(err) {
    hideTyping();
    const { bubbleEl, timeEl } = createSIBubble();
    bubbleEl.textContent = 'Connection issue. Try again in a moment. Standing by.';
    timeEl.textContent = now();
  }

  streaming = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

/* ─── Phase 2 · ElevenLabs Voice ─────────────── */
async function playVoice(text, parentEl) {
  try {
    const res = await fetch(`${SB_URL}/functions/v1/siindex-voice-tts`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SB_ANON}`
      },
      body: JSON.stringify({ text: text.slice(0, 2500) })
    });

    const data = await res.json();
    if (!data.voice_enabled) return; // not yet activated silent fail

    const bytes = Uint8Array.from(atob(data.audio_base64), c => c.charCodeAt(0));
    const url   = URL.createObjectURL(new Blob([bytes], { type: 'audio/mpeg' }));
    const audio = new Audio(url);

    // Mini player under the bubble
    if (parentEl) {
      const player = document.createElement('div');
      player.className = 'audio-player';
      const btnId = 'pb' + Date.now();
      player.innerHTML = `
        <button class="play-btn" id="${btnId}">▶</button>
        <span class="audio-label">SIINDEX VOICE</span>`;
      parentEl.appendChild(player);
      const btn = player.querySelector('#'+btnId);
      btn.onclick = () => audio.paused
        ? (audio.play(), btn.textContent = '⏸')
        : (audio.pause(), btn.textContent = '▶');
      audio.onended = () => btn.textContent = '▶';
    }

    audio.play();
  } catch(_) { /* voice error text chat continues */ }
}

/* ─── Auto-focus ─────────────────────────────── */
document.getElementById('msgInput').focus();
</script>
</body>
</html>
