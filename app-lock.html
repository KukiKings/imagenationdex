<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="assets/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IN$DEX — Unlock</title>
<style>
  :root {
    --cyan:#00D4FF; --blue:#2B35D8; --purple:#8B3FE8;
    --black:#090A10; --green:#00E5A0; --gold:#FFB800; --red:#FF4D6D;
    --surface:#12141F; --surface2:#1A1D2E; --surface3:#22263A;
    --text:#F0F2FF; --text2:#A0A8C8; --muted:#5A6080;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--black);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}

  .shell{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 48px;text-align:center;}

  /* Logo */
  .logo{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:0.05em;margin-bottom:40px;}

  /* Avatar */
  .avatar-wrap{position:relative;width:88px;height:88px;margin:0 auto 20px;}
  .avatar-ring{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,rgba(0,212,255,0.15),rgba(139,63,232,0.15));border:1.5px solid rgba(0,212,255,0.3);display:flex;align-items:center;justify-content:center;font-size:36px;}
  .avatar-status{position:absolute;bottom:2px;right:2px;width:18px;height:18px;border-radius:50%;background:var(--green);border:2px solid var(--black);}

  /* Domain */
  .citizen-name{font-size:18px;font-weight:800;margin-bottom:4px;}
  .citizen-domain{font-size:13px;color:var(--cyan);font-family:'SF Mono',monospace;margin-bottom:8px;}
  .welcome-sub{font-size:14px;color:var(--text2);margin-bottom:44px;line-height:1.5;}

  /* Biometric button */
  .bio-btn{width:100%;max-width:320px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:28px 24px;background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(139,63,232,0.12));border:1.5px solid rgba(0,212,255,0.35);border-radius:24px;cursor:pointer;transition:all 0.2s;margin-bottom:20px;}
  .bio-btn:active{transform:scale(0.97);border-color:var(--cyan);}
  .bio-icon-wrap{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,rgba(0,212,255,0.12),rgba(139,63,232,0.18));border:1.5px solid rgba(0,212,255,0.3);display:flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:4px;}
  .bio-label{font-size:17px;font-weight:800;color:var(--text);}
  .bio-sub{font-size:12px;color:var(--text2);}

  /* Scanning animation */
  .bio-btn.scanning .bio-icon-wrap{border-color:var(--cyan);box-shadow:0 0 0 4px rgba(0,212,255,0.15),0 0 24px rgba(0,212,255,0.2);animation:scanPulse 1s ease-in-out infinite;}
  @keyframes scanPulse{0%,100%{box-shadow:0 0 0 4px rgba(0,212,255,0.15),0 0 24px rgba(0,212,255,0.2);}50%{box-shadow:0 0 0 8px rgba(0,212,255,0.08),0 0 40px rgba(0,212,255,0.35);}}

  /* Domain fallback */
  .fallback-link{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;text-decoration-color:transparent;transition:all 0.2s;padding:8px;}
  .fallback-link:hover{color:var(--text2);text-decoration-color:var(--text2);}

  /* Domain recovery input */
  .domain-recovery{display:none;width:100%;max-width:320px;margin-top:16px;}
  .domain-recovery.show{display:block;}
  .domain-recovery-label{font-size:12px;color:var(--text2);text-align:left;margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;}
  .domain-input-wrap{display:flex;align-items:center;background:var(--surface);border:1.5px solid var(--surface3);border-radius:14px;padding:14px 16px;gap:8px;transition:border-color 0.2s;}
  .domain-input-wrap:focus-within{border-color:var(--cyan);}
  .domain-input-wrap span{font-size:15px;color:var(--text2);}
  .domain-input{flex:1;background:none;border:none;outline:none;font-size:15px;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  .domain-input::placeholder{color:var(--muted);}
  .domain-suffix{font-size:15px;font-weight:700;color:var(--cyan);}
  .domain-btn{width:100%;margin-top:12px;padding:16px;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .domain-btn:active{transform:scale(0.98);}

  /* Toast */
  .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid rgba(0,229,160,0.3);color:var(--text);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;transition:transform 0.3s;z-index:200;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="shell">

  <div class="logo">IN$DEX</div>

  <!-- Avatar -->
  <div class="avatar-wrap">
    <div class="avatar-ring" id="avatarIcon">👤</div>
    <div class="avatar-status"></div>
  </div>

  <div class="citizen-name" id="citizenName">Welcome back</div>
  <div class="citizen-domain" id="citizenDomain">sovereign.IN$DEX</div>
  <div class="welcome-sub">Your wallet is waiting.<br>Confirm it's you to unlock.</div>

  <!-- Biometric button -->
  <button class="bio-btn" id="bioBtn" onclick="startBiometric()">
    <div class="bio-icon-wrap" id="bioIconWrap">
      <span id="bioIcon">🔬</span>
    </div>
    <div class="bio-label" id="bioLabel">Use Face ID</div>
    <div class="bio-sub" id="bioSub">Tap to scan your face</div>
  </button>

  <!-- Fallback -->
  <button class="fallback-link" onclick="toggleDomainRecovery()">Use your Web3 domain instead</button>

  <!-- Domain recovery -->
  <div class="domain-recovery" id="domainRecovery">
    <div class="domain-recovery-label">Enter your sovereign address</div>
    <div class="domain-input-wrap">
      <input class="domain-input" id="domainInput" type="text" placeholder="yourname" autocomplete="off" autocapitalize="none" spellcheck="false">
      <div class="domain-suffix">.IN$DEX</div>
    </div>
    <button class="domain-btn" onclick="domainLogin()">Unlock with Domain →</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  // Populate from sessionStorage
  (function init() {
    const name   = sessionStorage.getItem('citizen_name');
    const domain = sessionStorage.getItem('citizen_web3_domain');
    if (name) document.getElementById('citizenName').textContent = name;
    if (domain) {
      const slug = domain.replace('.indx','').replace('.IN$DEX','');
      document.getElementById('citizenDomain').textContent = slug + '.IN$DEX';
    }
  })();

  function startBiometric() {
    const btn = document.getElementById('bioBtn');
    btn.classList.add('scanning');
    document.getElementById('bioLabel').textContent = 'Scanning…';
    document.getElementById('bioSub').textContent   = 'Hold still';
    document.getElementById('bioIcon').textContent  = '🔬';

    // Simulate Face ID scan
    setTimeout(() => {
      btn.classList.remove('scanning');
      document.getElementById('bioIcon').textContent  = '✅';
      document.getElementById('bioLabel').textContent = 'Identity confirmed.';
      document.getElementById('bioSub').textContent   = 'Welcome back. Standing by.';
      showToast('Identity confirmed. Standing by.');
      setTimeout(() => { window.location.href = 'citizen-dashboard.html'; }, 1400);
    }, 1800);
  }

  function toggleDomainRecovery() {
    const el = document.getElementById('domainRecovery');
    el.classList.toggle('show');
    if (el.classList.contains('show')) document.getElementById('domainInput').focus();
  }

  function domainLogin() {
    const slug = document.getElementById('domainInput').value.trim().toLowerCase().replace(/[^a-z0-9]/g,'');
    if (!slug) { showToast('Enter your domain name.'); return; }
    showToast('Verifying ' + slug + '.IN$DEX…');
    setTimeout(() => {
      showToast('Identity confirmed. Standing by.');
      setTimeout(() => { window.location.href = 'citizen-dashboard.html'; }, 1400);
    }, 1600);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
