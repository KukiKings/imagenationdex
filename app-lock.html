<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="assets/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>App Lock IN$DEX</title>
<style>
  :root {
    --cyan: #00D4FF; --blue: #2B35D8; --purple: #8B3FE8;
    --black: #090A10; --green: #00E5A0; --gold: #FFB800;
    --red: #FF4D6D; --surface: #12141F; --surface2: #1A1D2E;
    --surface3: #22263A; --text: #F0F2FF; --text2: #A0A8C8;
    --text-muted: #5A6080;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; max-width:430px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:48px 16px 32px; }

  .logo-mark { font-size:28px; font-weight:900; background:linear-gradient(135deg,var(--cyan),var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-1px; margin-bottom:8px; }
  .lock-title { font-size:20px; font-weight:700; text-align:center; margin-bottom:6px; }
  .lock-sub { font-size:14px; color:var(--text2); text-align:center; margin-bottom:40px; }

  /* Avatar */
  .avatar-ring { width:72px; height:72px; border-radius:50%; background:var(--surface2); border:2px solid rgba(0,212,255,0.3); display:flex; align-items:center; justify-content:center; margin:0 auto 32px; font-size:30px; }

  /* PIN dots */
  .pin-dots { display:flex; gap:16px; justify-content:center; margin-bottom:40px; }
  .pin-dot { width:18px; height:18px; border-radius:50%; border:2px solid var(--surface3); background:transparent; transition:all 0.15s; }
  .pin-dot.filled { background:var(--cyan); border-color:var(--cyan); }
  .pin-dot.error { background:var(--red); border-color:var(--red); animation:shake 0.3s ease; }

  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
  }

  /* Keypad */
  .keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%; max-width:280px; margin-bottom:24px; }
  .key { background:var(--surface); border:none; border-radius:16px; padding:18px 0; text-align:center; cursor:pointer; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
  .key:active { background:var(--surface2); transform:scale(0.95); }
  .key-num { font-size:24px; font-weight:600; color:var(--text); display:block; }
  .key-alpha { font-size:10px; color:var(--text-muted); letter-spacing:1.5px; display:block; margin-top:2px; }
  .key.del { background:transparent; }
  .key.del .key-num { font-size:20px; color:var(--text2); }
  .key.empty { background:transparent; cursor:default; }

  /* Biometric */
  .bio-btn { display:flex; align-items:center; justify-content:center; gap:10px; padding:14px 28px; background:var(--surface); border:none; border-radius:14px; color:var(--text2); font-size:14px; cursor:pointer; margin-bottom:32px; transition:all 0.2s; }
  .bio-btn:hover { color:var(--cyan); border-color:var(--cyan); }
  .bio-icon { font-size:22px; }

  /* Attempts */
  .attempts-warning { background:rgba(255,77,109,0.1); border:1px solid rgba(255,77,109,0.3); border-radius:10px; padding:10px 16px; font-size:12px; color:var(--red); text-align:center; margin-bottom:16px; display:none; width:100%; max-width:280px; }
  .attempts-warning.show { display:block; }

  .footer-links { display:flex; gap:20px; }
  .footer-link { font-size:13px; color:var(--text-muted); background:none; border:none; cursor:pointer; text-decoration:underline; }

  .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--surface2); color:var(--text); padding:12px 20px; border-radius:12px; font-size:13px; font-weight:500; transition:transform 0.3s; z-index:200; white-space:nowrap; border:1px solid rgba(0,229,160,0.3); }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="logo-mark">IN$DEX</div>
<div class="lock-title">Welcome back</div>
<div class="lock-sub">Enter your PIN to unlock</div>

<div class="avatar-ring">👤</div>

<div class="pin-dots" id="pinDots">
  <div class="pin-dot" id="d0"></div>
  <div class="pin-dot" id="d1"></div>
  <div class="pin-dot" id="d2"></div>
  <div class="pin-dot" id="d3"></div>
  <div class="pin-dot" id="d4"></div>
  <div class="pin-dot" id="d5"></div>
</div>

<div class="attempts-warning" id="attemptsWarning"></div>

<div class="keypad">
  <button class="key" onclick="pressKey('1')"><span class="key-num">1</span></button>
  <button class="key" onclick="pressKey('2')"><span class="key-num">2</span><span class="key-alpha">ABC</span></button>
  <button class="key" onclick="pressKey('3')"><span class="key-num">3</span><span class="key-alpha">DEF</span></button>
  <button class="key" onclick="pressKey('4')"><span class="key-num">4</span><span class="key-alpha">GHI</span></button>
  <button class="key" onclick="pressKey('5')"><span class="key-num">5</span><span class="key-alpha">JKL</span></button>
  <button class="key" onclick="pressKey('6')"><span class="key-num">6</span><span class="key-alpha">MNO</span></button>
  <button class="key" onclick="pressKey('7')"><span class="key-num">7</span><span class="key-alpha">PQRS</span></button>
  <button class="key" onclick="pressKey('8')"><span class="key-num">8</span><span class="key-alpha">TUV</span></button>
  <button class="key" onclick="pressKey('9')"><span class="key-num">9</span><span class="key-alpha">WXYZ</span></button>
  <button class="key empty"></button>
  <button class="key" onclick="pressKey('0')"><span class="key-num">0</span></button>
  <button class="key del" onclick="deleteKey()"><span class="key-num">⌫</span></button>
</div>

<button class="bio-btn" onclick="biometricAuth()">
  <span class="bio-icon">🔬</span>
  Use Face ID / Fingerprint
</button>

<div class="footer-links">
  <button class="footer-link" onclick="forgotPin()">Forgot PIN?</button>
  <button class="footer-link" onclick="switchAccount()">Switch account</button>
</div>

<div class="toast" id="toast"></div>

<script>
  let pin = [];
  let attempts = 0;
  const MAX_ATTEMPTS = 5;
  // Demo PIN: 123456
  const CORRECT_PIN = '123456';

  function pressKey(num) {
    if (pin.length >= 6) return;
    pin.push(num);
    updateDots();
    if (pin.length === 6) {
      setTimeout(checkPin, 200);
    }
  }

  function deleteKey() {
    if (pin.length > 0) {
      pin.pop();
      updateDots();
    }
  }

  function updateDots() {
    for (let i = 0; i < 6; i++) {
      const dot = document.getElementById('d' + i);
      dot.classList.toggle('filled', i < pin.length);
      dot.classList.remove('error');
    }
  }

  function checkPin() {
    const entered = pin.join('');
    if (entered === CORRECT_PIN) {
      showToast('Identity confirmed. Welcome back. Standing by.');
      setTimeout(() => { window.location.href = 'index.html'; }, 1800);
    } else {
      attempts++;
      pin = [];
      const remaining = MAX_ATTEMPTS - attempts;
      // Shake all dots red
      for (let i = 0; i < 6; i++) {
        const dot = document.getElementById('d' + i);
        dot.classList.remove('filled');
        dot.classList.add('error');
      }
      setTimeout(() => {
        for (let i = 0; i < 6; i++) {
          document.getElementById('d' + i).classList.remove('error');
        }
      }, 500);
      if (attempts >= MAX_ATTEMPTS) {
        lockAccount();
      } else {
        const w = document.getElementById('attemptsWarning');
        w.textContent = `Incorrect PIN. ${remaining} attempt${remaining === 1 ? '' : 's'} remaining.`;
        w.classList.add('show');
      }
    }
  }

  function lockAccount() {
    document.querySelector('.keypad').style.opacity = '0.3';
    document.querySelector('.keypad').style.pointerEvents = 'none';
    const w = document.getElementById('attemptsWarning');
    w.textContent = 'Account locked. Use Guardian Recovery to regain access.';
    w.classList.add('show');
    showToast('Account locked. Tap "Forgot PIN?" for recovery.');
  }

  function biometricAuth() {
    showToast('Identity confirmed. Welcome back. Standing by.');
    setTimeout(() => { window.location.href = 'index.html'; }, 1800);
  }

  function forgotPin() {
    showToast('Opening Guardian Recovery...');
    setTimeout(() => { window.location.href = 'guardian-setup.html'; }, 1500);
  }

  function switchAccount() {
    showToast('Switch account coming soon.');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
