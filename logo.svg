<svg viewBox="0 0 680 568" xmlns="http://www.w3.org/2000/svg" role="img" width="100%">
<title>IN$DEX — Image Nation Decentralised Exchange</title>
<desc>Tribal Maori-style wave with spiral arms, star outline, and IN$DEX wordmark</desc>
<defs>
<linearGradient id="wg" gradientUnits="userSpaceOnUse" x1="330" y1="5" x2="330" y2="360">
  <stop offset="0%"   stop-color="#8B3FE8"/>
  <stop offset="18%"  stop-color="#5530D8"/>
  <stop offset="42%"  stop-color="#2B35D8"/>
  <stop offset="68%"  stop-color="#1068C8"/>
  <stop offset="100%" stop-color="#00CCFF"/>
</linearGradient>
<linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%"   stop-color="#1820D0"/>
  <stop offset="38%"  stop-color="#6030E8"/>
  <stop offset="100%" stop-color="#00CCFF"/>
</linearGradient>
<linearGradient id="sg" gradientUnits="userSpaceOnUse" x1="490" y1="130" x2="600" y2="290">
  <stop offset="0%"   stop-color="#00CCFF"/>
  <stop offset="100%" stop-color="#4060FF"/>
</linearGradient>
</defs>

<!-- Wave arms: thick stroked bezier paths, gradient from purple (crown) to cyan (base) -->
<g fill="none" stroke="url(#wg)" stroke-linecap="round" stroke-linejoin="round">
  <!-- 1. Outer dome arc — the main outer rim of the wave -->
  <path stroke-width="42" d="M 112 342 C 70 310 44 248 56 168 C 68 88 122 28 220 6 C 292 -12 372 -10 444 14 C 516 38 562 96 570 168 C 578 234 564 294 528 326"/>
  <!-- 2. Right spiral — large counter-clockwise sweep (the dominant right element) -->
  <path stroke-width="34" d="M 522 318 C 506 338 482 350 454 342 C 418 330 392 298 382 258 C 372 218 384 178 410 158 C 434 140 462 144 478 164 C 494 183 492 210 475 228 C 460 244 440 244 428 230 C 416 216 418 196 432 188 C 444 180 458 186 460 200"/>
  <!-- 3. Right spiral inner loop -->
  <path stroke-width="24" d="M 456 204 C 460 218 452 232 440 234 C 428 236 418 226 418 214 C 418 202 428 194 438 198"/>
  <!-- 4. Right spiral innermost micro-curl -->
  <path stroke-width="14" d="M 435 200 C 440 206 438 214 432 216 C 426 218 420 212 422 206"/>
  <!-- 5. Left outer arm -->
  <path stroke-width="32" d="M 174 50 C 138 88 120 142 134 196 C 148 250 188 284 234 290 C 272 295 308 274 322 244"/>
  <!-- 6. Left secondary arm -->
  <path stroke-width="25" d="M 208 38 C 170 72 154 126 170 182 C 186 238 228 268 268 272 C 302 275 332 254 340 224"/>
  <!-- 7. Left tertiary arm -->
  <path stroke-width="19" d="M 240 30 C 204 60 190 112 208 166 C 226 220 266 248 302 249 C 330 250 353 232 356 206"/>
  <!-- 8. Left inner arm -->
  <path stroke-width="14" d="M 266 26 C 234 52 222 98 242 150 C 260 200 296 224 326 223 C 348 222 364 206 362 184"/>
  <!-- 9. Left innermost curl -->
  <path stroke-width="10" d="M 288 24 C 260 46 250 86 270 132 C 288 176 320 196 345 194 C 362 193 372 180 368 163"/>
  <!-- 10. Wave base flow -->
  <path stroke-width="22" d="M 112 342 C 138 354 200 364 280 360 C 340 357 395 348 440 342"/>
</g>

<!-- Star outline — lower right of wave -->
<polygon
  points="548,132 566,185 622,186 578,218 596,272 548,240 500,272 518,218 474,186 530,185"
  fill="none"
  stroke="url(#sg)"
  stroke-width="9"
  stroke-linejoin="round"/>

<!-- IN$DEX wordmark -->
<text
  x="340" y="528"
  font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif"
  font-weight="900"
  font-size="120"
  letter-spacing="-3"
  text-anchor="middle"
  fill="url(#tg)">IN$DEX</text>

</svg>
