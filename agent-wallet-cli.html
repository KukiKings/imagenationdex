<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/png" href="assets/favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Agent CLI IN$DEX</title>
  <style>
    :root{--cyan:#00D4FF;--blue:#2B35D8;--purple:#8B3FE8;--black:#090A10;--green:#00E5A0;--gold:#FFB800;--red:#FF4D6D;--surface:#12141F;--surface2:#1A1D2E;--surface3:#22263A;--border:rgba(255,255,255,0.07);--text:#F0F2FF;--text-muted:rgba(240,242,255,0.45);}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    body{background:#050608;color:var(--text);font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;}
    .phone{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
    .topbar{display:flex;align-items:center;padding:14px 16px 10px;gap:10px;border-bottom:1px solid rgba(0,212,255,0.12);position:sticky;top:0;background:#050608;z-index:20;}
    .tb-back{width:36px;height:36px;border-radius:10px;background:#0F1118;border:1px solid rgba(255,255,255,0.06);color:var(--text);font-size:18px;cursor:pointer;font-family:sans-serif;}
    .tb-title{flex:1;font-size:14px;font-weight:700;color:var(--cyan);}
    .tb-dot{width:8px;height:8px;background:var(--green);border-radius:50%;animation:blink 1.2s step-end infinite;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

    /* TERMINAL */
    .terminal{flex:1;padding:12px 14px;overflow-y:auto;font-size:12px;line-height:1.7;}
    .term-line{margin-bottom:2px;word-break:break-all;}
    .c-cyan{color:var(--cyan);}
    .c-green{color:var(--green);}
    .c-gold{color:var(--gold);}
    .c-red{color:var(--red);}
    .c-muted{color:rgba(255,255,255,0.35);}
    .c-purple{color:#C084FC;}
    .c-white{color:#fff;}
    .c-dim{color:rgba(255,255,255,0.2);}
    .prompt{color:var(--cyan);}
    .cursor{display:inline-block;width:8px;height:14px;background:var(--cyan);vertical-align:middle;animation:blink 1s step-end infinite;margin-left:2px;}

    /* INPUT BAR */
    .input-bar{border-top:1px solid rgba(0,212,255,0.12);padding:10px 14px;display:flex;align-items:center;gap:8px;background:#050608;}
    .ib-prompt{color:var(--cyan);font-size:13px;white-space:nowrap;}
    .ib-input{flex:1;background:transparent;border:none;color:#fff;font-size:13px;font-family:inherit;outline:none;}
    .ib-send{background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);border-radius:8px;padding:6px 12px;color:var(--cyan);font-size:12px;cursor:pointer;font-family:inherit;}

    /* APPROVAL MODAL */
    .approval-modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:none;align-items:flex-end;justify-content:center;z-index:100;max-width:430px;margin:0 auto;}
    .approval-modal.show{display:flex;}
    .approval-sheet{background:#12141F;border:1px solid rgba(139,63,232,0.3);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-height:80vh;overflow-y:auto;}
    .as-title{font-size:16px;font-weight:800;color:#fff;font-family:sans-serif;margin-bottom:4px;}
    .as-sub{font-size:12px;color:var(--text-muted);font-family:sans-serif;margin-bottom:16px;}
    .as-detail{background:#1A1D2E;border-radius:10px;padding:12px;margin-bottom:14px;font-size:12px;}
    .asd-row{display:flex;justify-content:space-between;padding:4px 0;}
    .asd-lbl{color:rgba(255,255,255,0.4);font-family:sans-serif;}
    .asd-val{color:#fff;font-family:sans-serif;font-weight:700;}
    .pqsi-result{border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:12px;font-family:sans-serif;}
    .pqsi-safe{background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);color:var(--green);}
    .pqsi-warn{background:rgba(255,184,0,0.08);border:1px solid rgba(255,184,0,0.2);color:var(--gold);}
    .as-buttons{display:flex;gap:8px;}
    .btn-approve{flex:1;padding:14px;border-radius:12px;background:var(--green);border:none;color:#000;font-size:14px;font-weight:800;cursor:pointer;font-family:sans-serif;}
    .btn-reject{flex:1;padding:14px;border-radius:12px;background:rgba(255,77,109,0.1);border:1px solid rgba(255,77,109,0.2);color:var(--red);font-size:14px;font-weight:700;cursor:pointer;font-family:sans-serif;}

    /* GOD MODE: TAP-TO-COPY TX HASH */
    .copy-tx{cursor:pointer;text-decoration:underline dotted;}
    .copy-tx:active{opacity:0.6;}
  </style>
</head>
<body>
<div class="phone">
  <div class="topbar">
    <button class="tb-back" onclick="history.back()">←</button>
    <div class="tb-title">SIINDEX AGENT CLI v1.0</div>
    <div class="tb-dot" id="tbDot"></div>
  </div>

  <div class="terminal" id="terminal"></div>

  <div class="input-bar">
    <div class="ib-prompt">agent@indx:~$</div>
    <input class="ib-input" id="cliInput" placeholder="type a command..." onkeydown="handleInput(event)">
    <button class="ib-send" onclick="sendCommand()">↵</button>
  </div>
</div>

<!-- APPROVAL MODAL -->
<div class="approval-modal" id="approvalModal">
  <div class="approval-sheet">
    <div class="as-title">🔐 2FA Approval Required</div>
    <div class="as-sub">This transaction exceeds your $250 auto-sign threshold. Approve to execute.</div>
    <div class="as-detail" id="approvalDetail">
      <div class="asd-row"><div class="asd-lbl">Action</div><div class="asd-val" id="apvAction"></div></div>
      <div class="asd-row"><div class="asd-lbl">Amount</div><div class="asd-val" id="apvAmount"></div></div>
      <div class="asd-row"><div class="asd-lbl">Protocol</div><div class="asd-val" id="apvProtocol"></div></div>
      <div class="asd-row"><div class="asd-lbl">Chain</div><div class="asd-val" id="apvChain"></div></div>
      <div class="asd-row"><div class="asd-lbl">Est. gas</div><div class="asd-val" id="apvGas"></div></div>
    </div>
    <div class="pqsi-result" id="pqsiResult"></div>
    <div class="as-buttons">
      <button class="btn-approve" onclick="approveTransaction()">✓ Approve</button>
      <button class="btn-reject" onclick="rejectTransaction()">✗ Reject</button>
    </div>
  </div>
</div>

<script>
const term = document.getElementById('terminal');
let lineQueue = [];
let running = false;
let pendingApproval = null;

const BOOT = [
  {txt:'', delay:0},
  {txt:'<span class="c-cyan">████████████████████████████████████</span>', delay:100},
  {txt:'<span class="c-cyan">  IN$DEX AGENT WALLET  v1.0.0</span>', delay:160},
  {txt:'<span class="c-cyan">  Sovereign SI Execution Environment</span>', delay:220},
  {txt:'<span class="c-cyan">████████████████████████████████████</span>', delay:280},
  {txt:'', delay:350},
  {txt:'<span class="c-muted">Initialising SIINDEX agent kernel...</span>', delay:500},
  {txt:'<span class="c-green">✓</span> <span class="c-muted">Grid Account bound</span> <span class="c-green">AJ.IN$DEX</span>', delay:700},
  {txt:'<span class="c-green">✓</span> <span class="c-muted">TEE key attestation</span> <span class="c-green">VALID</span>', delay:850},
  {txt:'<span class="c-green">✓</span> <span class="c-muted">PQSI threat scanner</span> <span class="c-green">ONLINE</span>', delay:1000},
  {txt:'<span class="c-green">✓</span> <span class="c-muted">MEV protection (Jito)</span> <span class="c-green">ACTIVE</span>', delay:1150},
  {txt:'<span class="c-green">✓</span> <span class="c-muted">Policy loaded</span> <span class="c-gold">limit: $500/txn · $2,000/day</span>', delay:1300},
  {txt:'<span class="c-green">✓</span> <span class="c-muted">Transaction Protection</span> <span class="c-green">$10,000/month coverage active</span>', delay:1450},
  {txt:'<span class="c-green">✓</span> <span class="c-muted">Chains online:</span> <span class="c-cyan">Solana · Ethereum · Arbitrum · Base</span>', delay:1600},
  {txt:'', delay:1750},
  {txt:'<span class="c-green">AGENT READY</span> <span class="c-muted"> awaiting market data stream...</span>', delay:1900},
  {txt:'', delay:2000},
];

const MARKET_STREAM = [
  {txt:'<span class="c-muted">[market]</span> <span class="c-cyan">INDX/USDC</span> <span class="c-white">0.24</span> <span class="c-green">▲+0.8%</span>', delay:2400},
  {txt:'<span class="c-muted">[market]</span> <span class="c-cyan">SOL/USDC</span> <span class="c-white">142.40</span> <span class="c-green">▲+1.2%</span>', delay:2700},
  {txt:'<span class="c-muted">[strategy]</span> Evaluating rebalance trigger... spread threshold met', delay:3200},
  {txt:'', delay:3500},
  {txt:'<span class="c-purple">►</span> <span class="c-white">AGENT ACTION:</span> swap 40 USDC → INDX on IN$DEX DEX', delay:3800},
  {txt:'  <span class="c-muted">Simulating transaction...</span>', delay:4100},
  {txt:'  <span class="c-green">✓ Simulation OK</span> expected output: 78.18 INDX, slippage 0.12%', delay:4400},
  {txt:'  <span class="c-green">✓ PQSI scan</span> threat tier: <span class="c-green">T0 CLEAR</span> · confidence 99.4%', delay:4700},
  {txt:'  <span class="c-muted">Amount $40.00 below 2FA threshold ($250)</span>', delay:5000},
  {txt:'  <span class="c-green">✓ AUTO-SIGNING</span> policy check passed', delay:5300},
  {txt:'  <span class="c-muted">Broadcasting via Jito bundle...</span>', delay:5600},
  {txt:'  <span class="c-green">✓ CONFIRMED</span> slot 284,192,841 · 0.4s · <span class="c-cyan copy-tx" onclick="copyTx(\'3xKm9pQr\')">tx: 3xKm...9pQr</span>', delay:6000},
  {txt:'  <span class="c-muted">Coverage: $40.00 applied → $280/$10,000 used this month</span>', delay:6300},
  {txt:'', delay:6600},
  {txt:'<span class="c-muted">[market]</span> Monitoring price bands... INDX holding above $0.241', delay:7200},
  {txt:'<span class="c-muted">[market]</span> Volume spike detected on SOL/USDC evaluating...</span>', delay:7800},
  {txt:'', delay:8200},
  {txt:'<span class="c-purple">►</span> <span class="c-white">AGENT ACTION:</span> add 600 INDX + 307 USDC to LP pool', delay:8600},
  {txt:'  <span class="c-muted">Simulating transaction...</span>', delay:8900},
  {txt:'  <span class="c-green">✓ Simulation OK</span> LP tokens: 1,186.4 LP-INDX', delay:9200},
  {txt:'  <span class="c-green">✓ PQSI scan</span> threat tier: <span class="c-green">T0 CLEAR</span>', delay:9500},
  {txt:'  <span class="c-gold">⚠ Amount $307.00 exceeds 2FA threshold ($250)</span>', delay:9800},
  {txt:'  <span class="c-gold">→ PAUSED awaiting human approval</span>', delay:10100},
];

const BLOCKED = [
  {txt:'', delay:0},
  {txt:'<span class="c-muted">[scanner]</span> <span class="c-red">PQSI ALERT</span> contract address flagged', delay:300},
  {txt:'  <span class="c-red">✗ Threat tier T3 ALERT</span> known rug-pull pattern detected', delay:600},
  {txt:'  <span class="c-red">✗ TRANSACTION BLOCKED</span> policy: malicious contract', delay:900},
  {txt:'  <span class="c-muted">Incident logged: #CE-2026-0142 · human review flagged</span>', delay:1200},
  {txt:'', delay:1400},
];

function printLine(html){
  const div=document.createElement('div');
  div.className='term-line';
  div.innerHTML=html;
  term.appendChild(div);
  term.scrollTop=term.scrollHeight;
}

async function runLines(lines){
  for(const l of lines){
    await delay(l.delay);
    printLine(l.txt);
  }
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

async function startCLI(){
  await runLines(BOOT);
  await runLines(MARKET_STREAM);
  // Show 2FA modal after LP action
  setTimeout(()=>{
    show2FA({
      action:'Add Liquidity',
      amount:'$307.00 (600 INDX + 307 USDC)',
      protocol:'IN$DEX LP Pools',
      chain:'Solana',
      gas:'~0.000025 SOL',
      pqsi:'T0 CLEAR no threats detected. Pool contract verified. Routine LP addition matching strategy parameters.',
      safe:true
    });
  }, 10400);
}

function show2FA(data){
  pendingApproval=data;
  document.getElementById('apvAction').textContent=data.action;
  document.getElementById('apvAmount').textContent=data.amount;
  document.getElementById('apvProtocol').textContent=data.protocol;
  document.getElementById('apvChain').textContent=data.chain;
  document.getElementById('apvGas').textContent=data.gas;
  const pr=document.getElementById('pqsiResult');
  pr.className='pqsi-result '+(data.safe?'pqsi-safe':'pqsi-warn');
  pr.innerHTML='<strong>PQSI: '+(data.safe?'T0 CLEAR ✓':'T2 CAUTION ⚠')+'</strong><br>'+data.pqsi;
  document.getElementById('approvalModal').classList.add('show');
}

function approveTransaction(){
  document.getElementById('approvalModal').classList.remove('show');
  printLine('');
  printLine('<span class="c-green">✓ 2FA APPROVED</span> biometric verified');
  printLine('  <span class="c-muted">Broadcasting via Jito bundle...</span>');
  setTimeout(()=>{
    printLine('  <span class="c-green">✓ CONFIRMED</span> slot 284,192,998 · 0.5s · <span class="c-cyan copy-tx" onclick="copyTx(\'8mNp4kWx\')">tx: 8mNp...4kWx</span>');
    printLine('  <span class="c-muted">Coverage: $307.00 applied → $587/$10,000 used this month</span>');
    printLine('');
    printLine('<span class="c-muted">[agent]</span> Resuming market monitoring...');
    printLine('<span class="c-muted">[market]</span> <span class="c-cyan">INDX/USDC</span> <span class="c-white">0.24</span> <span class="c-green">▲+0.1%</span>');
  },1200);
}

function rejectTransaction(){
  document.getElementById('approvalModal').classList.remove('show');
  printLine('');
  printLine('<span class="c-red">✗ REJECTED by user</span> LP addition cancelled');
  printLine('  <span class="c-muted">Agent resuming with modified strategy parameters...</span>');
  setTimeout(()=>printLine('<span class="c-muted">[agent]</span> Resuming market monitoring...'),800);
}

const COMMANDS = {
  'status': ()=>[
    '<span class="c-cyan">AGENT STATUS</span>',
    '  Active: <span class="c-green">YES</span>',
    '  Txns today: <span class="c-white">47</span>  |  Blocked: <span class="c-red">3</span>',
    '  Coverage used: <span class="c-green">$587 / $10,000</span>',
    '  Threat tier: <span class="c-green">T0 CLEAR</span>',
  ],
  'policy': ()=>[
    '<span class="c-cyan">ACTIVE POLICY</span>',
    '  Per-txn limit: <span class="c-gold">$500</span>',
    '  Daily outflow: <span class="c-gold">$2,000</span>',
    '  2FA threshold: <span class="c-gold">$250</span>',
    '  Chains: <span class="c-cyan">Solana · Ethereum · Arbitrum · Base</span>',
    '  PQSI: <span class="c-green">ON</span>  MEV protection: <span class="c-green">ON</span>',
  ],
  'pause': ()=>{
    setTimeout(()=>{
      printLine('<span class="c-gold">⏸ Agent paused no transactions will execute</span>');
      // GOD MODE PATCH: reflect paused state on the status dot, not just terminal text
      const dot=document.getElementById('tbDot');
      if(dot){dot.style.background='rgba(255,255,255,0.15)';dot.style.animation='none';}
    },200);
    return['<span class="c-muted">Pausing agent...</span>'];
  },
  'resume': ()=>{
    setTimeout(()=>{
      printLine('<span class="c-green">▶ Agent resumed</span>');
      // GOD MODE PATCH: restore the blinking active dot
      const dot=document.getElementById('tbDot');
      if(dot){dot.style.background='var(--green)';dot.style.animation='blink 1.2s step-end infinite';}
    },200);
    return['<span class="c-muted">Resuming agent...</span>'];
  },
  'clear': ()=>{term.innerHTML='';return[];},
  'help': ()=>[
    '<span class="c-cyan">COMMANDS</span>',
    '  status    agent health + coverage',
    '  policy    view active rules',
    '  pause     pause agent execution',
    '  resume    resume agent execution',
    '  scan [tx] PQSI scan a transaction',
    '  history   last 10 transactions',
    '  clear     clear the terminal',
    '  help      this menu',
    '  <span class="c-muted">tip: ↑ / ↓ recall previous commands · tap any tx hash to copy it</span>',
  ],
  'history': ()=>[
    '<span class="c-cyan">RECENT TRANSACTIONS</span>',
    '  <span class="c-green">✓</span> swap 40 USDC→INDX · $40 · Solana · 14:22',
    '  <span class="c-green">✓</span> stake 50 INDX · 30d · $12.00 · 14:18',
    '  <span class="c-green">✓</span> claim fees 2.4 INDX · $0.58 · 14:05',
    '  <span class="c-red">✗</span> blocked rug pattern · 13:58',
    '  <span class="c-green">✓</span> swap 20 USDC→SOL · $20 · Arbitrum · 13:41',
  ],
};

// GOD MODE: PERSISTED COMMAND HISTORY + ARROW RECALL
let cmdHistory=JSON.parse(localStorage.getItem('indx_cli_history')||'[]');
let historyIdx=cmdHistory.length;

function handleInput(e){
  if(e.key==='Enter'){sendCommand();return;}
  if(e.key==='ArrowUp'){
    e.preventDefault();
    if(historyIdx>0){historyIdx--;document.getElementById('cliInput').value=cmdHistory[historyIdx]||'';}
    return;
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    if(historyIdx<cmdHistory.length-1){historyIdx++;document.getElementById('cliInput').value=cmdHistory[historyIdx]||'';}
    else{historyIdx=cmdHistory.length;document.getElementById('cliInput').value='';}
    return;
  }
}

// GOD MODE: TAP-TO-COPY TX HASH
function copyTx(hash){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(hash).catch(()=>{});
  }
  printLine('<span class="c-muted">✓ copied full tx signature to clipboard</span>');
}

function sendCommand(){
  const input=document.getElementById('cliInput');
  const cmd=input.value.trim().toLowerCase();
  if(!cmd)return;
  input.value='';
  // GOD MODE PATCH: record command in persisted history
  cmdHistory.push(cmd);
  if(cmdHistory.length>20)cmdHistory.shift();
  localStorage.setItem('indx_cli_history',JSON.stringify(cmdHistory));
  historyIdx=cmdHistory.length;
  printLine(`<span class="prompt">agent@indx:~$</span> <span class="c-white">${cmd}</span>`);
  const fn=COMMANDS[cmd.split(' ')[0]];
  if(fn){
    const lines=fn();
    if(Array.isArray(lines))lines.forEach(l=>setTimeout(()=>printLine(l),80));
  } else if(cmd.startsWith('scan')){
    printLine('<span class="c-muted">Running PQSI scan...</span>');
    setTimeout(()=>{
      printLine('<span class="c-green">✓ T0 CLEAR</span> no threats detected · confidence 98.7%');
    },800);
  } else {
    printLine(`<span class="c-red">unknown command:</span> <span class="c-muted">${cmd} type 'help' for commands</span>`);
  }
}

startCLI();
</script>
<script src="siindex-speak-core.js"></script>
</body>
</html>
