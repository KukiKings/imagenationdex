<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Create Your PIN — IN$DEX</title>
<style>
  :root {
    --cyan: #00D4FF; --blue: #2B35D8; --purple: #8B3FE8;
    --black: #090A10; --green: #00E5A0; --gold: #FFB800;
    --red: #FF4D6D; --surface: #12141F; --surface2: #1A1D2E;
    --surface3: #22263A; --text: #F0F2FF; --text2: #A0A8C8;
    --text-muted: #5A6080;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; max-width:430px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

  .topbar { width:100%; background:var(--surface); border-bottom:1px solid rgba(255,255,255,0.06); padding:14px 16px; display:flex; align-items:center; gap:10px; }
  .progress-bar { flex:1; background:var(--surface3); border-radius:4px; height:4px; }
  .progress-fill { height:4px; border-radius:4px; background:linear-gradient(90deg,var(--cyan),var(--purple)); transition:width 0.4s; }
  .progress-label { font-size:11px; color:var(--text-muted); white-space:nowrap; }

  .content { flex:1; display:flex; flex-direction:column; align-items:center; width:100%; padding:32px 20px 120px; }

  /* Phase indicator */
  .phase { font-size:12px; color:var(--cyan); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:16px; font-weight:600; }

  .title { font-size:22px; font-weight:800; text-align:center; margin-bottom:8px; }
  .subtitle { font-size:14px; color:var(--text2); text-align:center; margin-bottom:32px; line-height:1.5; }

  /* PIN dots */
  .pin-dots { display:flex; gap:16px; justify-content:center; margin-bottom:32px; }
  .pin-dot { width:20px; height:20px; border-radius:50%; border:2px solid var(--surface3); background:transparent; transition:all 0.15s; }
  .pin-dot.filled { background:var(--cyan); border-color:var(--cyan); transform:scale(1.1); }
  .pin-dot.confirm-filled { background:var(--purple); border-color:var(--purple); transform:scale(1.1); }
  .pin-dot.error { background:var(--red); border-color:var(--red); animation:shake 0.3s ease; }
  .pin-dot.success { background:var(--green); border-color:var(--green); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

  /* Strength meter (phase 1 only) */
  .strength-row { display:flex; gap:6px; margin-bottom:28px; opacity:0; transition:opacity 0.3s; }
  .strength-row.show { opacity:1; }
  .strength-seg { flex:1; height:4px; border-radius:2px; background:var(--surface3); transition:background 0.3s; }
  .strength-seg.weak { background:var(--red); }
  .strength-seg.medium { background:var(--gold); }
  .strength-seg.strong { background:var(--green); }
  .strength-label { font-size:12px; text-align:center; margin-top:-20px; margin-bottom:16px; }

  /* Keypad */
  .keypad { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:100%; max-width:280px; }
  .key { background:var(--surface); border:none; border-radius:16px; padding:18px 0; text-align:center; cursor:pointer; transition:all 0.12s; -webkit-tap-highlight-color:transparent; }
  .key:active { background:var(--surface2); transform:scale(0.94); }
  .key-num { font-size:24px; font-weight:600; color:var(--text); display:block; }
  .key-alpha { font-size:10px; color:var(--text-muted); letter-spacing:1.5px; display:block; margin-top:2px; }
  .key.del { background:transparent; }
  .key.del .key-num { font-size:20px; color:var(--text2); }
  .key.empty { background:transparent; cursor:default; }

  /* Tips */
  .tip { background:var(--surface); border-radius:12px; padding:12px 16px; display:flex; gap:10px; align-items:center; margin-top:24px; width:100%; max-width:300px; }
  .tip-icon { font-size:18px; flex-shrink:0; }
  .tip-text { font-size:12px; color:var(--text-muted); line-height:1.5; }

  /* Success overlay */
  .success-overlay { position:fixed; inset:0; background:var(--black); display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.4s; z-index:100; padding:32px; text-align:center; }
  .success-overlay.show { opacity:1; pointer-events:all; }
  .success-icon { font-size:64px; margin-bottom:20px; }
  .success-title { font-size:26px; font-weight:800; color:var(--green); margin-bottom:8px; }
  .success-sub { font-size:14px; color:var(--text2); line-height:1.5; }

  .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--surface2); color:var(--text); padding:12px 20px; border-radius:12px; font-size:13px; font-weight:500; transition:transform 0.3s; z-index:200; white-space:nowrap; border:1px solid rgba(0,229,160,0.3); }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:80%"></div></div>
  <span class="progress-label">Step 4 of 5</span>
</div>

<div class="content">

  <div class="phase" id="phaseLabel">Create PIN</div>
  <div class="title" id="titleText">Choose a 6-digit PIN</div>
  <div class="subtitle" id="subtitleText">This locks your app. You'll enter it every time you open IN$DEX.</div>

  <div class="pin-dots" id="pinDots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
    <div class="pin-dot" id="d4"></div>
    <div class="pin-dot" id="d5"></div>
  </div>

  <!-- Strength meter (shown during entry) -->
  <div class="strength-row" id="strengthRow">
    <div class="strength-seg" id="seg0"></div>
    <div class="strength-seg" id="seg1"></div>
    <div class="strength-seg" id="seg2"></div>
    <div class="strength-seg" id="seg3"></div>
    <div class="strength-seg" id="seg4"></div>
    <div class="strength-seg" id="seg5"></div>
  </div>

  <div class="keypad">
    <button class="key" onclick="pressKey('1')"><span class="key-num">1</span></button>
    <button class="key" onclick="pressKey('2')"><span class="key-num">2</span><span class="key-alpha">ABC</span></button>
    <button class="key" onclick="pressKey('3')"><span class="key-num">3</span><span class="key-alpha">DEF</span></button>
    <button class="key" onclick="pressKey('4')"><span class="key-num">4</span><span class="key-alpha">GHI</span></button>
    <button class="key" onclick="pressKey('5')"><span class="key-num">5</span><span class="key-alpha">JKL</span></button>
    <button class="key" onclick="pressKey('6')"><span class="key-num">6</span><span class="key-alpha">MNO</span></button>
    <button class="key" onclick="pressKey('7')"><span class="key-num">7</span><span class="key-alpha">PQRS</span></button>
    <button class="key" onclick="pressKey('8')"><span class="key-num">8</span><span class="key-alpha">TUV</span></button>
    <button class="key" onclick="pressKey('9')"><span class="key-num">9</span><span class="key-alpha">WXYZ</span></button>
    <button class="key empty"></button>
    <button class="key" onclick="pressKey('0')"><span class="key-num">0</span></button>
    <button class="key del" onclick="deleteKey()"><span class="key-num">⌫</span></button>
  </div>

  <div class="tip" id="tipCard">
    <span class="tip-icon">💡</span>
    <div class="tip-text">Avoid obvious sequences like 123456 or your birth year. You're protecting real money.</div>
  </div>

</div>

<div class="success-overlay" id="successOverlay">
  <div class="success-icon">🔐</div>
  <div class="success-title">PIN set.</div>
  <div class="success-sub">Your wallet is locked. Only you can open it. Setting up your guardians next.</div>
</div>

<div class="toast" id="toast"></div>

<script>
  const WEAK_PINS = ['123456','654321','111111','000000','112233','121212','123123','999999','666666','777777'];
  let phase = 1; // 1 = create, 2 = confirm
  let firstPin = [];
  let confirmPin = [];

  function currentPin() { return phase === 1 ? firstPin : confirmPin; }

  function pressKey(num) {
    const pin = currentPin();
    if (pin.length >= 6) return;
    pin.push(num);
    updateDots();
    if (phase === 1) updateStrength();
    if (pin.length === 6) setTimeout(() => handleComplete(), 200);
  }

  function deleteKey() {
    const pin = currentPin();
    if (pin.length > 0) { pin.pop(); updateDots(); }
    if (phase === 1) updateStrength();
  }

  function updateDots() {
    const pin = currentPin();
    const cls = phase === 1 ? 'filled' : 'confirm-filled';
    for (let i = 0; i < 6; i++) {
      const dot = document.getElementById('d' + i);
      dot.className = 'pin-dot ' + (i < pin.length ? cls : '');
    }
  }

  function updateStrength() {
    const pin = firstPin.join('');
    const len = pin.length;
    document.getElementById('strengthRow').classList.toggle('show', len > 0);
    let strength = 0;
    if (len >= 6) strength++;
    if (!WEAK_PINS.includes(pin)) strength++;
    const allSame = pin.split('').every(c => c === pin[0]);
    if (!allSame && len >= 3) strength++;
    const sequential = '0123456789';
    const seqCheck = pin.length === 6 && (sequential.includes(pin) || sequential.includes(pin.split('').reverse().join('')));
    if (!seqCheck) strength++;
    const hasNonRepeat = new Set(pin.split('')).size >= 4;
    if (hasNonRepeat) strength++;
    if (len === 6) strength++;

    const levels = Math.min(Math.round(strength), 6);
    for (let i = 0; i < 6; i++) {
      const seg = document.getElementById('seg' + i);
      seg.className = 'strength-seg';
      if (i < levels) {
        if (levels <= 2) seg.classList.add('weak');
        else if (levels <= 4) seg.classList.add('medium');
        else seg.classList.add('strong');
      }
    }
  }

  function handleComplete() {
    if (phase === 1) {
      const pin = firstPin.join('');
      if (WEAK_PINS.includes(pin)) {
        shakeError();
        firstPin = [];
        showToast('That PIN is too common. Choose something harder to guess.');
        return;
      }
      // Move to confirm phase
      phase = 2;
      firstPin = firstPin.slice(); // freeze
      confirmPin = [];
      document.getElementById('phaseLabel').textContent = 'Confirm PIN';
      document.getElementById('titleText').textContent = 'Enter it again';
      document.getElementById('subtitleText').textContent = 'Just to make sure you\'ve got it.';
      document.getElementById('strengthRow').classList.remove('show');
      document.getElementById('tipCard').style.display = 'none';
      updateDots();
    } else {
      // Confirm phase
      if (firstPin.join('') === confirmPin.join('')) {
        pinSuccess();
      } else {
        shakeError();
        confirmPin = [];
        showToast('PINs don\'t match. Try again.');
        updateDots();
      }
    }
  }

  function shakeError() {
    for (let i = 0; i < 6; i++) {
      document.getElementById('d' + i).classList.add('error');
    }
    setTimeout(() => {
      for (let i = 0; i < 6; i++) {
        document.getElementById('d' + i).className = 'pin-dot';
      }
    }, 500);
  }

  function pinSuccess() {
    // Set all dots to success
    for (let i = 0; i < 6; i++) {
      document.getElementById('d' + i).classList.add('success');
    }
    setTimeout(() => {
      document.getElementById('successOverlay').classList.add('show');
      setTimeout(() => { window.location.href = 'guardian-setup.html'; }, 2200);
    }, 400);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
